<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ענק הרכבים — כלי מכירות</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ענק הרכבים">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0d1f3c">
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Heebo',sans-serif;
  background:#0d1f3c;
  color:#fff;
  min-height:100vh;
  display:flex;flex-direction:column;
}

.hdr{
  padding:28px 24px 0;
  text-align:center;
}
.hdr-logo{font-size:28px;font-weight:900;color:#fff}
.hdr-logo span{color:#c9a227}
.hdr-sub{font-size:14px;color:#7a9ccf;margin-top:6px}

.page{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px 60px;
  gap:16px;
  max-width:480px;
  margin:0 auto;
  width:100%;
}

.tool-btn{
  display:flex;align-items:center;gap:20px;
  width:100%;
  background:#fff;
  border-radius:18px;
  padding:22px 24px;
  text-decoration:none;
  color:#0d1f3c;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
  transition:transform .12s, box-shadow .12s;
}
.tool-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(0,0,0,.35);
}
.tool-btn:active{transform:translateY(0)}

.tool-icon{
  font-size:36px;
  line-height:1;
  flex-shrink:0;
}

.tool-text{}
.tool-title{font-size:18px;font-weight:900;color:#0d1f3c}
.tool-desc{font-size:13px;color:#5a7aa5;margin-top:3px}

/* accent colors per button */
.tool-btn.new   { border-right:5px solid #1a56db; }
.tool-btn.used  { border-right:5px solid #c9a227; }
.tool-btn.quote { border-right:5px solid #16a34a; }

.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#2a4a7a;
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">ענק <span>הרכבים</span></div>
  <div class="hdr-sub">כלי מכירות פנימי</div>
</div>

<div class="page">

  <a class="tool-btn new" href="finance.html">
    <div class="tool-icon">🚗</div>
    <div class="tool-text">
      <div class="tool-title">מימון רכב חדש</div>
      <div class="tool-desc">השוואת מסלולי כאל ומימון ישיר</div>
    </div>
  </a>

  <a class="tool-btn used" href="finance-used.html">
    <div class="tool-icon">🔑</div>
    <div class="tool-text">
      <div class="tool-title">מימון רכב משומש</div>
      <div class="tool-desc">לפי שנתון — כאל ומימון ישיר</div>
    </div>
  </a>

  <a class="tool-btn quote" href="quote.html">
    <div class="tool-icon">📋</div>
    <div class="tool-text">
      <div class="tool-title">הצעת מחיר</div>
      <div class="tool-desc">טרייד אין, מימון והחזר חודשי</div>
    </div>
  </a>

</div>

<div class="footer">ענק הרכבים · כלי פנימי לאנשי מכירות</div>

</body>
</html>
