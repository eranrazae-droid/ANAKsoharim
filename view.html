<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>סיכום עסקה — ענק הרכבים</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1f3c">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#f0f4fa;color:#0d1f3c;min-height:100vh;overflow-x:hidden}

.hdr{background:#0d1f3c;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-size:16px;font-weight:900;color:#fff}
.hdr-logo span{color:#c9a227}
.hdr-sub{font-size:12px;color:#7a9ccf;margin-top:2px}

/* progress dots */
.progress{display:flex;justify-content:center;gap:10px;padding:14px 0 6px}
.dot{width:10px;height:10px;border-radius:50%;background:#dce6f5;transition:background .3s}
.dot.active{background:#0ea5e9}
.dot.done{background:#16a34a}

/* slides */
.slides{display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1);width:300%}
.slide{width:33.333%;padding:10px 12px 100px;flex-shrink:0}

/* cards */
.card{background:#fff;border-radius:14px;border:1px solid #dce6f5;box-shadow:0 2px 8px rgba(13,31,60,.06);padding:12px;margin-bottom:10px}
.card-title{font-size:10px;font-weight:700;color:#5a7aa5;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0f4fa}
.row:last-child{border-bottom:none}
.lbl{font-size:11px;color:#7a9ab8;font-weight:600}
.val{font-size:13px;font-weight:900;color:#0d1f3c}

/* chosen plan */
.plan-card{background:#16a34a;border-radius:14px;padding:16px;color:#fff;margin-bottom:10px}
.plan-title{font-size:10px;color:rgba(255,255,255,.7);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.plan-cols{display:flex;gap:16px;flex-wrap:wrap}
.plan-col .pl{font-size:10px;color:rgba(255,255,255,.65);margin-bottom:2px}
.plan-col .pv{font-size:16px;font-weight:900;color:#fff}
.plan-col .pv.gold{color:#fde047}

/* checklist view */
.check-done{background:#f0fdf4;border:2px solid #16a34a;border-radius:12px;display:flex;align-items:center;gap:10px;padding:12px 14px;margin-bottom:8px}
.check-icon{width:24px;height:24px;background:#16a34a;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0}
.check-text{font-size:13px;font-weight:700;color:#166534}

/* slide title */
.slide-title{font-size:18px;font-weight:900;margin-bottom:2px;color:#0d1f3c}
.slide-title span{color:#0ea5e9}
.slide-num{font-size:11px;color:#7a9ab8;margin-bottom:10px;font-weight:600}

/* bottom nav */
.nav-bar{position:fixed;bottom:0;right:0;left:0;background:#fff;border-top:1px solid #dce6f5;padding:14px 16px;display:flex;gap:10px}
.nav-prev{flex:1;background:#f0f4fa;color:#5a7aa5;border:none;border-radius:12px;padding:14px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.nav-next{flex:2;background:#0d1f3c;color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:900;cursor:pointer}
.nav-next.done-btn{background:#16a34a}

/* status badge */
.status-pill{display:inline-block;background:#16a34a;color:#fff;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:900;margin-bottom:10px}

/* timing */
.timing-box{background:#0d1f3c;border-radius:12px;padding:12px;text-align:center;margin-bottom:8px}
.timing-lbl{font-size:10px;color:#7a9ccf;font-weight:600;margin-bottom:4px}
.timing-val{font-size:15px;font-weight:900;color:#4ade80}

/* 2-col layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.two-col>.card{margin-bottom:0}
.car-divider{width:1px;background:#dce6f5}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">ענק <span>הרכבים</span></div>
    <div class="hdr-sub" id="hdr-name">סיכום עסקה</div>
  </div>
  <a href="quotes.html" style="color:#7a9ccf;font-size:13px;font-weight:700;text-decoration:none;background:#1a2f54;padding:8px 14px;border-radius:8px">← חזרה</a>
</div>

<div class="progress" id="progress"></div>

<div style="overflow:hidden">
  <div class="slides" id="slides">

    <!-- SLIDE 1: הקמת הצעה ובחירת מסלול -->
    <div class="slide" id="slide-0">
      <div class="slide-title">הקמת הצעה <span>ובחירת מסלול</span></div>
      <div class="slide-num">שלב 1 מתוך 3</div>
      <div id="s1-content"></div>
    </div>

    <!-- SLIDE 2: מסלול נבחר -->
    <div class="slide" id="slide-1">
      <div class="slide-title">חתימת חוזים, ביטוח מקיף, <span>העברת יתרה</span></div>
      <div class="slide-num">שלב 2 מתוך 3</div>
      <div id="s2-content"></div>
    </div>

    <!-- SLIDE 3: חתימות -->
    <div class="slide" id="slide-2">
      <div class="slide-title">סיום <span>בעלות</span></div>
      <div class="slide-num">שלב 3 מתוך 3</div>
      <div id="s3-content"></div>
    </div>

  </div>
</div>

<div class="nav-bar">
  <button class="nav-prev" id="btn-prev" onclick="go(-1)" style="display:none">← הקודם</button>
  <button class="nav-next" id="btn-next" onclick="go(1)">הבא ←</button>
</div>

<script>
var current = 0;
var total = 3;
var deal = null;

function fmt(n){ return '₪ ' + Math.round(n||0).toLocaleString('he-IL'); }

function fmtElapsed(ms) {
  if (ms < 0) ms = 0;
  var s = Math.floor(ms / 1000);
  var h = Math.floor(s / 3600);
  var m = Math.floor((s % 3600) / 60);
  var sec = s % 60;
  var pad = function(n){ return n < 10 ? '0' + n : '' + n; };
  var parts = [];
  if (h) parts.push(h + 'ש\'');
  parts.push(pad(m) + 'ד\'');
  parts.push(pad(sec) + 'ש"');
  return parts.join(' ');
}

function fmtDHM(ms) {
  if (ms < 0) ms = 0;
  var totalMin = Math.floor(ms / 60000);
  var d = Math.floor(totalMin / 1440);
  var h = Math.floor((totalMin % 1440) / 60);
  var m = totalMin % 60;
  return d + ':' + h + ':' + m;
}

function init() {
  var params = new URLSearchParams(location.search);
  var idx = parseInt(params.get('i') || '0');
  var deals = JSON.parse(localStorage.getItem('anak-deals') || '[]');
  deal = deals[idx];
  if (!deal) { document.body.innerHTML = '<p style="padding:40px;text-align:center;font-size:18px">לא נמצאה עסקה</p>'; return; }

  document.getElementById('hdr-name').textContent = deal.customer || 'סיכום עסקה';

  renderProgress();
  renderSlide1();
  renderSlide2();
  renderSlide3();
  updateNav();
}

function renderProgress() {
  var html = '';
  for (var i = 0; i < total; i++) {
    html += '<div class="dot' + (i === current ? ' active' : (i < current ? ' done' : '')) + '" id="dot-' + i + '"></div>';
  }
  document.getElementById('progress').innerHTML = html;
}

function timingBox(label, ms, color) {
  color = color || '#4ade80';
  return '<div class="timing-box"><div class="timing-lbl">' + label + '</div><div class="timing-val" style="color:' + color + '">' + fmtElapsed(ms) + '</div></div>';
}

function timingBoxDHM(label, ms, color) {
  color = color || '#4ade80';
  return '<div class="timing-box"><div class="timing-lbl">' + label + '</div><div class="timing-val" style="color:' + color + '">' + fmtDHM(ms) + '</div></div>';
}

function renderSlide1() {
  var d = deal;
  var completedAt = d.completedAt     || Date.now();
  var createdAt   = d.createdAt       || completedAt;
  var statusAt    = d.statusChangedAt || completedAt;
  var stageMs = statusAt - createdAt;
  var totalMs = completedAt - createdAt;
  var html = '';

  // Row 1: timing (right col) + customer (left col)
  html += '<div class="two-col">';
  // right: timing boxes
  html += '<div>';
  html += timingBox('זמן בשלב זה', stageMs, '#38bdf8');
  html += timingBox('זמן כולל לעסקה', totalMs, '#4ade80');
  html += '</div>';
  // left: customer
  html += '<div class="card" style="margin-bottom:0">';
  html += '<div class="card-title">פרטי לקוח</div>';
  if (d.customer)   html += row('שם', d.customer);
  if (d.phone)      html += row('טלפון', d.phone);
  if (d.rep)        html += row('נציג מכירות', d.rep);
  if (d.financeRep) html += row('נציג מימון', d.financeRep);
  html += '</div>';
  html += '</div>';

  // Row 2: cars
  var hasOld = !!(d.oldCar || d.oldPlate);
  if (hasOld) {
    html += '<div class="two-col">';
    // new car
    html += '<div class="card" style="margin-bottom:0"><div class="card-title">רכב חדש</div>';
    if (d.newPlate) html += row('רישוי', d.newPlate);
    if (d.newCar)   html += row('דגם', '<span style="background:#fde047;color:#000;border-radius:4px;padding:1px 6px;font-size:11px">' + d.newCar + '</span>');
    if (d.newPrice) html += row('מחיר', fmt(d.newPrice));
    html += '</div>';
    // old car
    html += '<div class="card" style="margin-bottom:0"><div class="card-title">רכב ישן</div>';
    if (d.oldPlate) html += row('רישוי', d.oldPlate);
    if (d.oldCar)   html += row('דגם', d.oldCar);
    if (d.tradeIn)  html += row('זיכוי', fmt(d.tradeIn));
    html += '</div>';
    html += '</div>';
  } else {
    html += '<div class="card"><div class="card-title">רכב חדש</div>';
    if (d.newPlate) html += row('רישוי', d.newPlate);
    if (d.newCar)   html += row('דגם', '<span style="background:#fde047;color:#000;border-radius:4px;padding:1px 8px">' + d.newCar + '</span>');
    if (d.newPrice) html += row('מחיר', fmt(d.newPrice));
    html += '</div>';
  }

  // Row 3: deal details
  html += '<div class="card"><div class="card-title">פרטי עסקה</div>';
  if (!hasOld && d.tradeIn) html += row('זיכוי טרייד אין', fmt(d.tradeIn));
  if (d.oldLoan)  html += row('חוב מימון ישן', fmt(d.oldLoan));
  if (d.cash)     html += row('כסף מהלקוח', fmt(d.cash));
  if (d.finance)  html += row('סכום מימון', '<span style="font-size:16px;font-weight:900;color:#1a56db">' + fmt(d.finance) + '</span>');
  if (d.monthly)  html += row('החזר חודשי', '<span style="font-size:16px;font-weight:900;color:#1a56db">' + fmt(d.monthly) + '</span>');
  html += '</div>';

  document.getElementById('s1-content').innerHTML = html;
}

function renderSlide2() {
  var d = deal;
  var completedAt = d.completedAt     || Date.now();
  var createdAt   = d.createdAt       || completedAt;
  var statusAt    = d.statusChangedAt || completedAt;
  var stageMs = statusAt - createdAt;
  var html = '';

  html += '<div class="two-col" style="margin-bottom:10px">';
  html += timingBoxDHM('זמן בשלב זה', stageMs, '#38bdf8');
  html += timingBoxDHM('זמן כולל', completedAt - createdAt, '#4ade80');
  html += '</div>';

  var chosen = null;
  var rejected = [];
  if (d.approvalPlans) {
    d.approvalPlans.forEach(function(p){ p.chosen ? chosen = p : rejected.push(p); });
  }

  if (chosen) {
    html += '<div class="plan-card">';
    html += '<div class="plan-title">✓ מסלול שנבחר</div>';
    html += '<div class="plan-cols">';
    if (chosen.company) html += '<div class="plan-col"><div class="pl">חברת מימון</div><div class="pv">' + chosen.company + '</div></div>';
    if (chosen.amount)  html += '<div class="plan-col"><div class="pl">סכום מאושר</div><div class="pv gold">' + chosen.amount + '</div></div>';
    if (chosen.rate)    html += '<div class="plan-col"><div class="pl">ריבית</div><div class="pv">' + chosen.rate + '%</div></div>';
    html += '</div></div>';

    var needed = d.finance || 0;
    var approved = parseFloat(chosen.amount) || 0;
    var balance = needed - approved;
    if (balance > 0) {
      html += '<div class="card"><div class="card-title">יתרה להעברה</div>';
      html += row('סכום מימון נדרש', fmt(needed));
      html += row('סכום מאושר', chosen.amount);
      html += row('יתרה', '<span style="font-size:16px;font-weight:900;color:#e02d2d">' + fmt(balance) + '</span>');
      html += '</div>';
    }
  } else {
    html += '<div class="card"><p style="text-align:center;color:#7a9ab8;padding:20px">לא נבחר מסלול</p></div>';
  }

  if (rejected.length) {
    html += '<div class="card"><div class="card-title">מסלולים שנדחו</div>';
    rejected.forEach(function(p) {
      html += '<div style="background:#e02d2d;border-radius:10px;padding:10px;color:#fff;margin-bottom:8px;display:flex;gap:14px;flex-wrap:wrap">';
      if (p.company) html += '<div><div style="font-size:10px;color:rgba(255,255,255,.65)">חברה</div><div style="font-weight:900;font-size:13px">' + p.company + '</div></div>';
      if (p.amount)  html += '<div><div style="font-size:10px;color:rgba(255,255,255,.65)">סכום</div><div style="font-weight:900;font-size:13px">' + p.amount + '</div></div>';
      if (p.rate)    html += '<div><div style="font-size:10px;color:rgba(255,255,255,.65)">ריבית</div><div style="font-weight:900;font-size:13px">' + p.rate + '%</div></div>';
      html += '</div>';
    });
    html += '</div>';
  }

  document.getElementById('s2-content').innerHTML = html;
}

function renderSlide3() {
  var d = deal;
  var labels = ['חתימת חוזה מימון', 'חתימת חוזה ענק הרכבים', 'שליחת ביטוח מקיף למימון', 'העברת יתרה'];
  var html = '';

  var ref      = d.completedAt     || Date.now();
  var statusAt = d.statusChangedAt || d.createdAt || ref;
  var signingMs = ref - statusAt;
  var createdAt = d.createdAt || ref;

  html += '<div class="two-col" style="margin-bottom:10px">';
  html += timingBox('זמן בשלב זה', signingMs, '#38bdf8');
  html += timingBox('זמן כולל', ref - createdAt, '#4ade80');
  html += '</div>';

  html += '<div class="status-pill">✅ כל השלבים הושלמו</div>';
  html += '<div style="margin-top:10px">';
  labels.forEach(function(lbl) {
    html += '<div class="check-done">';
    html += '<div class="check-icon">✓</div>';
    html += '<div class="check-text">' + lbl + '</div>';
    html += '</div>';
  });
  html += '</div>';

  html += '<div class="card" style="margin-top:10px"><div class="card-title">תזמון</div>';
  html += row('זמן בשלב חתימות', fmtElapsed(signingMs));
  html += row('הושלם בתאריך', new Date(ref).toLocaleString('he-IL'));
  html += '</div>';

  document.getElementById('s3-content').innerHTML = html;
}

function row(lbl, val) {
  return '<div class="row"><span class="lbl">' + lbl + '</span><span class="val">' + val + '</span></div>';
}

function go(dir) {
  current = Math.max(0, Math.min(total - 1, current + dir));
  document.getElementById('slides').style.transform = 'translateX(' + (current * 33.333) + '%)';
  updateNav();
  renderProgress();
  window.scrollTo(0, 0);
}

function updateNav() {
  var prev = document.getElementById('btn-prev');
  var next = document.getElementById('btn-next');
  prev.style.display = current === 0 ? 'none' : 'block';
  if (current === total - 1) {
    next.textContent = 'מברוק !! סיימנו את העסקה 💯';
    next.className = 'nav-next done-btn';
    next.onclick = function(){ location.href = 'quotes.html'; };
  } else {
    next.textContent = 'הבא →';
    next.className = 'nav-next';
    next.onclick = function(){ go(1); };
  }
}

init();
</script>
</body>
</html>
