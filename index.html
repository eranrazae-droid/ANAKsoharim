<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ענק הרכבים – פורטל מידע נציגים</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;direction:rtl}
header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.4)}
header img{height:38px}
header h1{color:#fff;font-size:20px;font-weight:700;flex:1}
header .date{color:#aaa;font-size:13px}
.toolbar{background:#fff;padding:14px 20px;border-bottom:1px solid #e0e0e0;position:sticky;top:66px;z-index:99;display:flex;flex-direction:column;gap:10px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:10px 40px 10px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:#c9a227}
.search-wrap::before{content:'🔍';position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:16px}
.brand-filter{display:flex;gap:8px;flex-wrap:wrap}
.brand-btn{padding:5px 14px;border:2px solid #ddd;background:#fff;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.brand-btn.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.brand-btn:hover:not(.active){border-color:#c9a227;color:#c9a227}
.count-bar{padding:8px 20px;font-size:13px;color:#666}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:16px 20px}
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 18px rgba(0,0,0,.14)}
.card-header{padding:14px 16px 10px;border-bottom:1px solid #f0f0f0}
.card-brand{font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.card-model{font-size:17px;font-weight:700;color:#1a1a2e;line-height:1.2;margin:2px 0 6px}
.fuel-badges{display:flex;gap:6px;align-items:center}
.fuel-badge{padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700}
.fuel-ev{background:#e8f5e9;color:#2e7d32}
.fuel-phev{background:#e3f2fd;color:#1565c0}
.fuel-hev{background:#f3e5f5;color:#6a1b9a}
.fuel-ben{background:#fff8e1;color:#e65100}
.fuel-diz{background:#fce4ec;color:#880e4f}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#f0f0f0;border-bottom:1px solid #f0f0f0}
.price-box{background:#fff;padding:10px 14px}
.price-box .label{font-size:10px;color:#999;font-weight:600;margin-bottom:2px}
.price-box .value{font-size:16px;font-weight:700;color:#1a1a2e}
.price-box .value.green{color:#2e7d32}
.price-box .value.gold{color:#b8860b}
.price-box .value.blue{color:#1565c0}
.colors-section{padding:10px 14px}
.colors-title{font-size:11px;color:#999;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.color-chips{display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto}
.color-chip{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-radius:8px;background:#f8f8f8;font-size:12px}
.color-names{font-weight:600;color:#333}
.color-int{color:#888;font-weight:400;font-size:11px}
.avail-now{background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.avail-soon{background:#fff8e1;color:#e65100;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.no-colors{font-size:12px;color:#bbb;font-style:italic}
.notes-box{margin:0 14px 10px;padding:7px 10px;background:#fffbf0;border-right:3px solid #c9a227;border-radius:0 6px 6px 0;font-size:11px;color:#7a6000;line-height:1.4}
.empty{text-align:center;padding:60px;color:#aaa;font-size:16px;grid-column:1/-1}
@media(max-width:600px){
  .grid{grid-template-columns:1fr;padding:10px}
  header h1{font-size:16px}
  .toolbar{top:58px}
}
</style>
</head>

function pmt(d){
  if(!d) return null;
  var r=0.043/12,n=100;
  return Math.round(d*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1));
}

function fmt(n){
  if(!n && n!==0) return '';
  return Math.round(n).toLocaleString('he-IL');
}

  if(f==='EV') return 'fuel-ev';

  if(f==='HEV') return 'fuel-hev';

    if(pairs.length){
      pairs.forEach(function(p){
        var badge = p[2]==='זמין מיידי'
          ? '<span class="avail-now">✓ זמין</span>'
          : '<span class="avail-soon">⏳ בקרוב</span>';
        colorsHtml += '<div class="color-chip">'
          + '<span class="color-names">' + p[0] + ' <span class="color-int">/ ' + p[1] + '</span></span>'
          + badge + '</div>';
      });
    } else {
      colorsHtml = '<span class="no-colors">אין מידע על צבעים</span>';
    }

    var notesHtml = c.notes ? '<div class="notes-box">' + c.notes + '</div>' : '';

    html += '<div class="card">'
      + '<div class="card-header">'
      + '<div class="card-brand">' + c.brand + '</div>'
      + '<div class="card-model">' + c.model + '</div>'
      + '<div class="fuel-badges"><span class="fuel-badge ' + fuelClass(c.fuel) + '">' + c.fuel + '</span></div>'
      + '</div>'
      + '<div class="price-grid">'
      + '<div class="price-box"><div class="label">מחירון כולל רישוי</div><div class="value">' + fmt(c.catalog) + ' ₪</div></div>'
      + '<div class="price-box"><div class="label">מחיר מבוקש</div><div class="value gold">' + fmt(c.dealer) + ' ₪</div></div>'
      + '<div class="price-box"><div class="label">חיסכון ללקוח</div><div class="value green">' + fmt(c.discount) + ' ₪</div></div>'
      + '<div class="price-box"><div class="label">100 תשלומים (4.3%)</div><div class="value blue">' + (monthly ? fmt(monthly)+' ₪' : '—') + '</div></div>'
      + '</div>'
      + '<div class="colors-section"><div class="colors-title">צבעים זמינים</div><div class="color-chips">' + colorsHtml + '</div></div>'
      + notesHtml
      + '</div>';
  });
  document.getElementById('grid').innerHTML = html;
}

// Init
var d = new Date();
document.getElementById('curDate').textContent = d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
buildBrandFilter();
render();
</script>
</body>
</html>
