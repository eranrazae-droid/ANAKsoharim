<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>מימונים בתהליך — ענק הרכבים</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ענק הרכבים">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0d1f3c">
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");
// force fresh load v41
(function(){
  var key='anak-page-ver';var ver='41';
  if(localStorage.getItem(key)!==ver){
    localStorage.setItem(key,ver);
    if(!location.search.includes('v=')){
      location.replace(location.pathname+'?v='+ver);
    }
  }
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;color:#0d1f3c;min-height:100vh;background:url('/bg-quotes.jpg') center top/cover fixed}

.hdr{background:#0d1f3c;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:relative}
.hdr-logo{font-size:18px;font-weight:900;color:#fff}
.hdr-logo span{color:#c9a227}
.hdr-title{font-size:13px;color:#7a9ccf;margin-top:2px}

/* גריד חלוניות עסקאות */
.deals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:16px;background:transparent;border-bottom:1px solid rgba(255,255,255,0.2)}
.deal-card{background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.45);border-radius:18px;overflow:hidden;cursor:pointer;box-shadow:0 8px 32px rgba(13,31,60,.22);transition:border-color .15s;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.deal-card:hover{border-color:#0ea5e9}
.deal-card.active{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.15)}
.deal-card-hdr{background:rgba(13,31,60,0.65);padding:10px 12px;backdrop-filter:blur(4px)}
.deal-card-name{font-size:14px;font-weight:900;color:#fff}
.deal-card-status{font-size:10px;color:#a8c4e8;margin-top:3px;font-weight:600}
.deal-card-body{padding:10px 12px;background:rgba(255,255,255,0.12)}
.deal-card-monthly{font-size:20px;font-weight:900;color:#0d1f3c}
.deal-card-car{font-size:11px;font-weight:700;background:#fde047;color:#000;border-radius:4px;padding:2px 6px;display:inline-block;margin-top:4px}

/* split layout */
.split{display:flex;gap:0;min-height:calc(100vh - 120px)}

/* ימין — פרטי הצעה — בדיוק חצי מסך */
.panel-right{width:50%;padding:20px;border-left:1px solid rgba(255,255,255,0.3);overflow-y:auto;margin-right:auto;background:rgba(255,255,255,0.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}

/* שמאל — פאנל פעולה — חצי מסך */
.panel-left{width:50%;padding:20px;background:rgba(255,255,255,0.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;flex-direction:column;gap:12px}

.section-title{font-size:11px;font-weight:700;color:#5a7aa5;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}

.detail-card{background:#fff;border:1px solid #dce6f5;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0f4fa}
.detail-row:last-child{border-bottom:none}
.detail-lbl{font-size:12px;color:#7a9ab8;font-weight:600}
.detail-val{font-size:14px;font-weight:900;color:#0d1f3c}
.detail-val.big{font-size:20px;color:#1a56db}
.detail-val.gold{color:#c9a227}

.action-btn{width:100%;border:none;border-radius:12px;padding:16px;font-family:'Heebo',sans-serif;font-size:16px;font-weight:900;cursor:pointer}
.action-btn.green{background:#16a34a;color:#fff;box-shadow:0 4px 14px rgba(22,163,74,.25)}
.action-btn.red{background:#fff0f0;color:#e02d2d;border:1.5px solid #ffd6d6}

.approval-form{background:#f5f8ff;border:1px solid #dce6f5;border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px}
.approval-form label{font-size:11px;font-weight:700;color:#5a7aa5;display:block;margin-bottom:3px}
.approval-form input{width:100%;border:1.5px solid #dce6f5;border-radius:8px;padding:10px 12px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;color:#0d1f3c;outline:none;background:#fff}
.approval-form input:focus{border-color:#16a34a}
.save-approval-btn{background:#16a34a;color:#fff;border:none;border-radius:8px;padding:12px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;width:100%}

.empty-state{text-align:center;padding:80px 20px;color:#7a9ab8;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:18px;font-weight:700;color:#5a7aa5;margin-bottom:6px}
.empty-sub{font-size:14px;color:#a0b4cc}

@media(max-width:640px){
  .split{flex-direction:column}
  .panel-left{width:100%;border-top:1px solid #dce6f5}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">ענק <span>הרכבים</span></div>
    <div class="hdr-title">מימונים בתהליך</div>
  </div>
  <div style="position:absolute;left:50%;transform:translateX(-50%)">
    <a href="index.html" style="color:#7a9ccf;font-size:13px;font-weight:700;text-decoration:none;background:#1a2f54;padding:8px 16px;border-radius:8px;">→ דף הבית</a>
  </div>
  <div style="display:flex;gap:8px">
    <button id="btn-back" onclick="backToGrid()" style="display:none;color:#7a9ccf;font-size:13px;font-weight:700;background:#1a2f54;border:none;padding:8px 16px;border-radius:8px;cursor:pointer">← למסך המימונים</button>
  </div>
</div>
<!-- חיפוש -->
<div style="padding:10px 12px 0;display:flex;justify-content:flex-end">
  <button onclick="toggleDealsSearch()" style="background:#1a2f54;color:#7a9ccf;border:none;border-radius:10px;padding:8px 16px;font-family:Heebo,sans-serif;font-size:13px;font-weight:700;cursor:pointer">🔍 חיפוש</button>
</div>
<div id="deals-search-panel" style="display:none;padding:8px 12px 0">
  <input id="deals-search-input" type="text" placeholder="חיפוש לפי שם או טלפון..." oninput="searchDeals()" style="width:100%;border:1.5px solid #1a56db;border-radius:10px;padding:12px 14px;font-family:Heebo,sans-serif;font-size:15px;color:#0d1f3c;outline:none;box-sizing:border-box">
</div>
<!-- גריד חלוניות עסקאות -->
<div class="deals-grid" id="deals-bar"></div>

<!-- ארכיון מימונים -->
<div style="padding:0 12px 100px" id="deals-archive-section">
  <div style="display:flex;align-items:center;gap:10px;margin:16px 0 10px;cursor:pointer" onclick="toggleDealsArchive()">
    <div style="font-size:15px;font-weight:900;color:#7a9ccf">📦 ארכיון מימונים</div>
    <div id="deals-archive-badge" style="background:#1a2f54;color:#7a9ccf;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700">0</div>
    <div id="deals-archive-chevron" style="color:#7a9ccf;font-size:13px;margin-right:auto">▼</div>
  </div>
  <div id="deals-archive-list" style="display:none;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px"></div>
</div>

<div class="split" id="split-panel" style="display:none">
  <!-- פרטי הצעה — ימין -->
  <div class="panel-right" id="panel-right">
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-text">אין עסקאות פעילות</div>
      <div class="empty-sub">לחץ "התקדם לעסקה" בהצעת מחיר כדי להוסיף</div>
    </div>
  </div>

  <!-- פאנל פעולה — שמאל -->
  <div class="panel-left" id="panel-left" style="display:none">
    <div class="section-title">פעולות עסקה</div>

    <button class="action-btn green" id="btn-hokama" onclick="toggleApproval()">🏦 הוקמה הצעה ב...</button>

    <div class="approval-form" id="approval-form" style="display:none">
      <div>
        <label>חברת מימון</label>
        <select id="finance-company" style="width:100%;border:1.5px solid #dce6f5;border-radius:8px;padding:10px 12px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;color:#0d1f3c;outline:none;background:#fff">
          <option value="">בחר חברה...</option>
          <option value="ויזה כאל">ויזה כאל</option>
          <option value="מימון ישיר">מימון ישיר</option>
          <option value="מזרחי">מזרחי</option>
          <option value="מימון בקליק">מימון בקליק</option>
          <option value="פמה">פמה</option>
        </select>
      </div>
      <div>
        <label>סכום מאושר (₪)</label>
        <input type="text" id="approved-amount" placeholder="סכום או טווח..." style="-webkit-appearance:none;-moz-appearance:textfield">
      </div>
      <div>
        <label>אחוז ריבית מאושר (%)</label>
        <input type="text" id="approved-rate" placeholder="0.00" inputmode="decimal" style="-webkit-appearance:none;-moz-appearance:textfield" oninput="this.value=this.value.replace(/[^0-9.]/g,'')">
      </div>
      <button class="save-approval-btn" onclick="saveAndShowSummary()">💾 שמור הצעה</button>
    </div>

    <!-- מסלולים שנשמרו -->
    <div id="plans-container"></div>

    <button class="action-btn red" onclick="rejectDeal()">❌ ההלוואה לא אושרה</button>
  </div>
</div>

<script>
var selectedIdx = 0;

function fmt(n){ return '₪ ' + Math.round(n||0).toLocaleString('he-IL'); }
function pad(n){ return n < 10 ? '0'+n : ''+n; }

function fmtElapsed(ms) {
  if (ms < 0) ms = 0;
  var totalSec = Math.floor(ms / 1000);
  var d = Math.floor(totalSec / 86400);
  var h = Math.floor((totalSec % 86400) / 3600);
  var m = Math.floor((totalSec % 3600) / 60);
  var s = totalSec % 60;
  function z(n){ return n < 10 ? '0' + n : String(n); }
  return z(d) + ':' + z(h) + ':' + z(m) + ':' + z(s);
}

var FB_URL = 'https://anak-sales-default-rtdb.firebaseio.com';
function fbSet(path, data) {
  fetch(FB_URL + path + '.json', {method:'PUT', body:JSON.stringify(data), headers:{'Content-Type':'application/json'}}).catch(function(){});
}
function getDeals(){ return JSON.parse(localStorage.getItem('anak-deals') || '[]'); }
function saveDeals(d){ localStorage.setItem('anak-deals', JSON.stringify(d)); fbSet('/deals', d); }

function selectDeal(i) {
  var deals = getDeals();
  var d = deals[i];
  if (d && d.dealStatus === 'ממתין לחתימת חוזים, ביטוח מקיף, העברת יתרה') {
    location.replace('sign.html?i=' + i);
    return;
  }
  if (d && (d.dealStatus === 'הושלם וממתין למסירה' || d.dealStatus === 'הושלם')) {
    location.replace('delivery.html?i=' + i);
    return;
  }
  if (d && d.dealStatus === 'טרם הוקמה הלוואה') {
    location.replace('quotes.html?deal=' + i);
    return;
  }
  openDealPanel(i);
}

function openDealPanel(i) {
  selectedIdx = i;
  document.getElementById('deals-bar').style.display = 'none';
  document.getElementById('btn-back').style.display = 'block';
  document.getElementById('split-panel').style.display = 'flex';
  renderBar();
  renderDetail();
}

function printDeal() {
  var deals = getDeals();
  var d = deals[selectedIdx] || deals[0];
  if (!d) return;
  function r(lbl, val) { return val ? '<tr><td style="padding:6px 12px;font-size:13px;color:#7a9ab8;font-weight:600;white-space:nowrap">' + lbl + '</td><td style="padding:6px 12px;font-size:14px;font-weight:700;color:#0d1f3c">' + val + '</td></tr>' : ''; }
  var rows = '';
  rows += r('שם לקוח', d.customer);
  rows += r('טלפון', d.phone);
  rows += r('נציג מכירות', d.rep);
  rows += r('נציג מימון', d.financeRep);
  rows += r('רכב חדש', d.newCar);
  rows += r('מספר רישוי', d.newPlate);
  if (d.newPrice) rows += r('מחיר רכב', fmt(d.newPrice));
  if (d.tradeIn)  rows += r('זיכוי טרייד אין', fmt(d.tradeIn));
  if (d.oldPlate) rows += r('רישוי טרייד אין', d.oldPlate);
  if (d.oldLoan)  rows += r('חוב מימון רכב ישן', fmt(d.oldLoan));
  if (d.cash)     rows += r('כסף שהלקוח מביא', fmt(d.cash));
  if (d.finance)  rows += r('סכום מימון', fmt(d.finance));
  if (d.monthly)  rows += r('החזר חודשי', fmt(d.monthly));
  if (d.n)        rows += r('מספר תשלומים', d.n);
  if (d.track)    rows += r('מסלול', d.track);
  rows += r('סטטוס', d.dealStatus);
  var chosen = null;
  if (d.approvalPlans) d.approvalPlans.forEach(function(p){ if (p.chosen) chosen = p; });
  if (chosen) {
    rows += r('חברת מימון נבחרת', chosen.company);
    rows += r('סכום מאושר', chosen.amount);
    if (chosen.rate) rows += r('ריבית', chosen.rate + '%');
  }
  var w = window.open('', '_blank', 'width=700,height=900');
  w.document.write('<!DOCTYPE html><html dir="rtl" lang="he"><head><meta charset="UTF-8"><title>פרטי עסקה — ' + (d.customer||'') + '</title><style>body{font-family:Arial,sans-serif;padding:32px;direction:rtl}h1{font-size:22px;margin-bottom:4px}h2{font-size:14px;color:#5a7aa5;font-weight:400;margin-bottom:24px}table{width:100%;border-collapse:collapse}tr:nth-child(even){background:#f5f8ff}td{border-bottom:1px solid #e8edf5}@media print{button{display:none}}</style></head><body>');
  w.document.write('<h1>ענק הרכבים — פרטי עסקה</h1>');
  w.document.write('<h2>' + (d.customer || '') + ' · ' + new Date().toLocaleDateString('he-IL') + '</h2>');
  w.document.write('<table>' + rows + '</table>');
  w.document.write('<br><button onclick="window.print()" style="background:#0d1f3c;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:15px;cursor:pointer">הדפס</button>');
  w.document.write('</body></html>');
  w.document.close();
}

function backToGrid() {
  document.getElementById('split-panel').style.display = 'none';
  document.getElementById('btn-back').style.display = 'none';
  document.getElementById('deals-bar').style.display = 'grid';
}

function toggleDealsSearch() {
  var panel = document.getElementById('deals-search-panel');
  var open = panel.style.display !== 'none';
  panel.style.display = open ? 'none' : 'block';
  if (!open) {
    document.getElementById('deals-search-input').value = '';
    document.getElementById('deals-search-input').focus();
    renderBar();
  } else {
    renderBar();
  }
}

function searchDeals() {
  var q = document.getElementById('deals-search-input').value.trim().toLowerCase();
  var deals = getDeals();
  var el = document.getElementById('deals-bar');
  if (!q) { renderBar(); return; }
  var html = '';
  deals.forEach(function(d, i) {
    var name  = (d.customer || '').toLowerCase();
    var phone = (d.phone    || '').toLowerCase();
    if (name.indexOf(q) < 0 && phone.indexOf(q) < 0) return;
    html += dealCardHTML(d, i);
  });
  el.innerHTML = html || '<span style="color:#7a9ab8;font-size:13px;padding:4px">לא נמצאו תוצאות</span>';
}

function dealCardHTML(d, i) {
    var status = d.dealStatus || 'טרם הוקמה הלוואה';
    var done = status === 'הושלם';
    var ref = d.completedAt || Date.now();
    var createdMs  = done ? (ref - (d.createdAt || ref)) : null;
    var statusMs   = done ? (ref - (d.statusChangedAt || d.createdAt || ref)) : null;
    var timerCreated = done
      ? '<div style="font-size:16px;font-weight:900;color:#9ca3af;font-variant-numeric:tabular-nums;letter-spacing:2px">' + fmtElapsed(createdMs) + '</div>'
      : '<div class="timer-created" style="font-size:16px;font-weight:900;color:#4ade80;font-variant-numeric:tabular-nums;letter-spacing:2px" data-createdat="' + d.createdAt + '">' + fmtElapsed(Date.now() - d.createdAt) + '</div>';
    var timerStatus = done
      ? '<div style="font-size:16px;font-weight:900;color:#9ca3af;font-variant-numeric:tabular-nums;letter-spacing:2px">' + fmtElapsed(statusMs) + '</div>'
      : '<div class="timer-status" style="font-size:16px;font-weight:900;color:#facc15;font-variant-numeric:tabular-nums;letter-spacing:2px" data-statusat="' + (d.statusChangedAt||d.createdAt) + '">' + fmtElapsed(Date.now() - (d.statusChangedAt||d.createdAt)) + '</div>';
    var clickAction = done ? 'location.href=\'view.html?i=' + i + '\'' : 'selectDeal(' + i + ')';
    var rejected = status === 'נדחה';
    var statusBg = done ? '#16a34a' : rejected ? '#dc2626' : '#fde047';
    var statusColor = done || rejected ? '#fff' : '#000';
    return '<div class="deal-card' + (i === selectedIdx && !done ? ' active' : '') + '" style="' + (done ? 'opacity:.85' : '') + '">' +
      '<div class="deal-card-hdr" onclick="' + clickAction + '" style="cursor:pointer">' +
        '<div class="deal-card-name">' + (d.customer || 'לא ידוע') + '</div>' +
        (d.phone ? '<div style="font-size:11px;color:#7a9ccf;margin-top:2px;font-weight:500">' + d.phone + '</div>' : '') +
        '<div class="deal-card-status" style="margin-top:4px"><span style="background:' + statusBg + ';color:' + statusColor + ';border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">סטטוס: ' + status + '</span></div>' +
      '</div>' +
      '<div class="deal-card-body" onclick="' + clickAction + '" style="cursor:pointer">' +
        (function() {
          if (!d.dealStatus) {
            // טרם הוקמה הצעה — הצג פרטים בסגנון חלונית הצעה
            var inner = '';
            if (d.newCar) inner += '<div style="font-size:12px;color:#0d1f3c;font-weight:700;margin-bottom:6px">' + d.newCar + '</div><br>';
            inner += '<div style="font-size:22px;font-weight:900;color:#1a56db">' + fmt(d.monthly) + '<span style="font-size:13px;color:#5a7aa5;font-weight:400"> /חודש</span></div>';
            if (d.rep || d.date) inner += '<div style="font-size:11px;color:#7a9ab8;margin-top:4px">' + (d.rep ? 'נציג מכירות: ' + d.rep + ' · ' : '') + (d.date || '') + '</div>';
            if (d.finance) inner += '<div style="font-size:11px;color:#5a7aa5;margin-top:4px">מימון: ' + fmt(d.finance) + '</div>';
            return inner;
          }
          return '<div class="deal-card-monthly">₪ ' + Math.round(d.monthly||0).toLocaleString('he-IL') + '</div>' +
            (d.newCar ? '<div style="font-size:11px;font-weight:700;color:#0d1f3c;margin-top:4px">' + d.newCar + '</div>' : '') +
            (d.financeRep ? '<div style="font-size:11px;color:#5a7aa5;margin-top:6px;font-weight:600">נציג מימון: ' + d.financeRep + '</div>' : '');
        }()) +
      '</div>' +
      '<div style="background:rgba(13,31,60,0.5);padding:8px 10px;display:flex;flex-direction:column;gap:6px">' +
        '<div style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:8px 10px;text-align:center">' +
          '<div style="font-size:9px;color:#c8daf0;font-weight:600;margin-bottom:4px;letter-spacing:.5px">זמן מאז הקמה · ימים : שעות : דקות : שניות</div>' +
          timerCreated +
        '</div>' +
        '<div style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:8px 10px;text-align:center">' +
          '<div style="font-size:9px;color:#c8daf0;font-weight:600;margin-bottom:4px;letter-spacing:.5px">זמן בסטטוס נוכחי · ימים : שעות : דקות : שניות</div>' +
          timerStatus +
        '</div>' +
      '</div>' +
      ((done || rejected) ? '<button onclick="archiveDeal(' + i + ')" style="width:100%;border:none;background:rgba(13,31,60,0.55);color:#a8c4e8;font-family:\'Heebo\',sans-serif;font-size:12px;font-weight:700;padding:8px;cursor:pointer;border-top:1px solid rgba(255,255,255,0.15)">📦 שליחה לארכיון</button>' : '') +
      (!done && !rejected ? '<button onclick="deleteDealCard(event,' + i + ')" style="width:100%;border:none;background:rgba(127,29,29,0.65);color:#fca5a5;font-family:\'Heebo\',sans-serif;font-size:12px;font-weight:700;padding:8px;cursor:pointer;border-top:1px solid rgba(255,255,255,0.1)">🗑 מחיקת מימון</button>' : '') +
    '</div>';
}

function renderBar() {
  var deals = getDeals();
  var el = document.getElementById('deals-bar');
  if (!deals.length) { el.innerHTML = '<span style="color:#7a9ab8;font-size:13px;padding:4px">אין עסקאות פעילות</span>'; return; }
  var fixed = false;
  deals.forEach(function(d) {
    if (!d.createdAt) { d.createdAt = d.id || Date.now(); fixed = true; }
    if (!d.statusChangedAt) { d.statusChangedAt = d.createdAt; fixed = true; }
  });
  if (fixed) saveDeals(deals);
  el.innerHTML = deals.map(function(d, i) { return dealCardHTML(d, i); }).join('');
}

  html += '<div class="detail-row"><span class="detail-lbl">טלפון</span><span class="detail-val">' + (d.phone || '—') + '</span></div>';
  html += '<div class="detail-row"><span class="detail-lbl">נציג מכירות</span><span class="detail-val">' + (d.rep || '—') + '</span></div>';

  if (d.tradeIn)   html += '<div class="detail-row"><span class="detail-lbl">זיכוי טרייד אין</span><span class="detail-val">' + fmt(d.tradeIn) + '</span></div>';
  if (d.oldPlate)  html += '<div class="detail-row"><span class="detail-lbl">רישוי טרייד אין</span><span class="detail-val">' + d.oldPlate + '</span></div>';
  if (d.newPrice)  html += '<div class="detail-row"><span class="detail-lbl">סה"כ עסקה</span><span class="detail-val">' + fmt(d.newPrice) + '</span></div>';

function renderPlans(d) {
  var plans = d.approvalPlans || [];
  var container = document.getElementById('plans-container');
  var anyChosen = plans.some(function(p){ return p.chosen; });
  var isRejected = d.dealStatus === 'נדחה';

  // gray out action buttons when rejected
  var btnHokama = document.getElementById('btn-hokama');
  var btnReject = document.querySelector('.action-btn.red');
  if (isRejected) {
    [btnHokama, btnReject].forEach(function(b) {
      if (!b) return;
      b.disabled = true;
      b.style.background = '#d1d5db';
      b.style.color = '#9ca3af';
      b.style.boxShadow = 'none';
      b.style.cursor = 'not-allowed';
      b.style.opacity = '.7';
    });
  } else if (btnHokama) {
    if (anyChosen) {
      btnHokama.disabled = true;
      btnHokama.style.background = '#9ca3af';
      btnHokama.style.boxShadow = 'none';
      btnHokama.style.cursor = 'not-allowed';
    } else {
      btnHokama.disabled = false;
      btnHokama.style.background = '';
      btnHokama.style.boxShadow = '';
      btnHokama.style.cursor = '';
      btnHokama.style.color = '';
      btnHokama.style.opacity = '';
    }
    if (btnReject) {
      btnReject.disabled = false;
      btnReject.style.background = '';
      btnReject.style.color = '';
      btnReject.style.cursor = '';
      btnReject.style.opacity = '';
    }
  }

  if (!plans.length) { container.innerHTML = ''; return; }
  container.innerHTML = plans.map(function(p, i) {
    var bg = p.chosen ? '#16a34a' : (anyChosen ? '#e02d2d' : '#0d1f3c');
    var chosenLabel = p.chosen ? '✓ מסלול נבחר!' : '⭐ בחירה במסלול זה';
    var row = '<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">';
    if (p.company) row += '<div><span style="color:#7a9ccf;font-size:11px;display:block;margin-bottom:2px">חברת מימון</span><span style="font-weight:900;font-size:16px;color:#fff">' + p.company + '</span></div>';
    if (p.amount)  row += '<div style="border-right:1px solid #2a4a7a;padding-right:18px"><span style="color:#7a9ccf;font-size:11px;display:block;margin-bottom:2px">סכום מאושר</span><span style="font-weight:900;font-size:16px;color:#c9a227">' + p.amount + '</span></div>';
    if (p.rate)    row += '<div style="border-right:1px solid #2a4a7a;padding-right:18px"><span style="color:#7a9ccf;font-size:11px;display:block;margin-bottom:2px">ריבית מאושרת</span><span style="font-weight:900;font-size:16px;color:#38bdf8">' + p.rate + '%</span></div>';
    row += '</div>';
    return '<div style="background:' + bg + ';border-radius:14px;padding:16px;color:#fff;margin-bottom:8px">' +
      '<div style="font-size:12px;color:#7a9ccf;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px">✓ פרטי מסלול שנשמר</div>' +
      row +
      '<div style="display:flex;gap:8px;margin-top:14px">' +
        '<button onclick="choosePlan(' + i + ')" style="flex:1;background:' + (p.chosen?'rgba(255,255,255,.2)':'#c9a227') + ';color:#fff;border:none;border-radius:10px;padding:12px;font-family:\'Heebo\',sans-serif;font-size:14px;font-weight:900;cursor:pointer">' + chosenLabel + '</button>' +
        '<button onclick="deletePlan(' + i + ')" style="flex:1;background:#e02d2d;color:#fff;border:none;border-radius:10px;padding:12px;font-family:\'Heebo\',sans-serif;font-size:14px;font-weight:900;cursor:pointer">🗑 מחיקת מסלול</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleApproval() {
  var f = document.getElementById('approval-form');
  var isOpen = f.style.display !== 'none';
  if (isOpen) { f.style.display = 'none'; return; }
  // פתח עם שדות ריקים
  document.getElementById('finance-company').selectedIndex = 0;
  document.getElementById('approved-amount').value = '';
  document.getElementById('approved-rate').value = '';
  f.style.display = 'flex';
}

function saveAndShowSummary() {
  var company = document.getElementById('finance-company').value.trim();
  var amount  = document.getElementById('approved-amount').value;
  var rate    = document.getElementById('approved-rate').value;
  if (!company && !amount && !rate) { alert('יש למלא לפחות שדה אחד'); return; }

  var deals = getDeals();
  if (!deals.length) return;
  var d = deals[selectedIdx] || deals[0];
  if (!d.approvalPlans) d.approvalPlans = [];
  d.approvalPlans.push({ company: company, amount: amount, rate: parseFloat(rate)||0, chosen: false });
  deals[selectedIdx] = d;
  saveDeals(deals);

  // אפס טופס והסתר
  document.getElementById('finance-company').selectedIndex = 0;
  document.getElementById('approved-amount').value = '';
  document.getElementById('approved-rate').value = '';
  document.getElementById('approval-form').style.display = 'none';

  renderPlans(d);
}

function deletePlan(i) {
  var deals = getDeals();
  if (!deals.length) return;
  var d = deals[selectedIdx] || deals[0];
  if (!d.approvalPlans) return;
  d.approvalPlans.splice(i, 1);
  deals[selectedIdx] = d;
  saveDeals(deals);
  renderPlans(d);
}

function choosePlan(i) {
  var deals = getDeals();
  if (!deals.length) return;
  var d = deals[selectedIdx] || deals[0];
  if (!d.approvalPlans) return;
  d.approvalPlans.forEach(function(p){ p.chosen = false; });
  d.approvalPlans[i].chosen = true;
  deals[selectedIdx] = d;
  saveDeals(deals);
  renderPlans(d);
  // נווט לדף החתימה
  setTimeout(function(){ location.href = 'sign.html?i=' + selectedIdx; }, 300);
}

function archiveDeal(i) {
  if (!confirm('להעביר עסקה זו לארכיון? היא תוסר גם ממסך ההצעות.')) return;
  var deals = getDeals();
  var d = deals.splice(i, 1)[0];
  var now = new Date().toLocaleString('he-IL');
  d.archivedAt = now;

  // ארכיון מימונים
  var archD = JSON.parse(localStorage.getItem('anak-archive') || '[]');
  archD.unshift(d);
  localStorage.setItem('anak-archive', JSON.stringify(archD));
  fbSet('/archive', archD);
  saveDeals(deals);

  // ארכיון הצעות — מצא ומחק לפי id
  var hist = JSON.parse(localStorage.getItem('anak-quotes') || '[]');
  var qi = hist.findIndex(function(q){ return q.id === d.id || q.createdAt === d.createdAt; });
  if (qi >= 0) {
    var archQ = JSON.parse(localStorage.getItem('anak-archive-quotes') || '[]');
    var q = hist.splice(qi, 1)[0];
    q.archivedAt = now;
    archQ.unshift(q);
    localStorage.setItem('anak-archive-quotes', JSON.stringify(archQ));
    localStorage.setItem('anak-quotes', JSON.stringify(hist));
  }

  selectedIdx = 0;
  renderBar();
  document.getElementById('split-panel').style.display = 'none';
  document.getElementById('btn-back').style.display = 'none';
  document.getElementById('deals-bar').style.display = 'grid';
}

function deleteDealCard(e, idx) {
  e.stopPropagation();
  if (!confirm('למחוק את המימון? ההצעה תחזור לניתן לעריכה.')) return;
  var deals = getDeals();
  var deal = deals[idx];
  deals.splice(idx, 1);
  saveDeals(deals);

  // שחרר את ההצעה המקורית מסטטוס inProcess
  if (deal && deal.id) {
    var quotes = JSON.parse(localStorage.getItem('anak-quotes') || '[]');
    var qi = quotes.findIndex(function(q){ return q.id === deal.id; });
    if (qi >= 0) {
      quotes[qi].inProcess = false;
      localStorage.setItem('anak-quotes', JSON.stringify(quotes));
    }
  }

  selectedIdx = 0;
  backToGrid();
  renderBar();
}

function rejectDeal() {
  if (!confirm('לסמן את ההלוואה כנדחתה?')) return;
  var deals = getDeals();
  deals[selectedIdx].dealStatus = 'נדחה';
  deals[selectedIdx].statusChangedAt = Date.now();
  saveDeals(deals);
  // סגור פאנל ורנדר מחדש
  backToGrid();
  renderBar();
}

function tickTimers() {
  var now = Date.now();
  document.querySelectorAll('.timer-created').forEach(function(el) {
    el.textContent = fmtElapsed(now - parseInt(el.dataset.createdat, 10));
  });
  document.querySelectorAll('.timer-status').forEach(function(el) {
    el.textContent = fmtElapsed(now - parseInt(el.dataset.statusat, 10));
  });
}
setInterval(tickTimers, 1000);

        '<span style="background:#374151;color:#9ca3af;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700">📦 ארכיון · ' + (d.dealStatus || '') + '</span>' +
      '</div>' +
      '<div style="padding:10px 14px;cursor:pointer" onclick="openArchivedDeal(' + i + ')">' +

        '<div style="font-size:18px;font-weight:900;color:#4ade80">' + fmt(d.monthly) + '<span style="font-size:11px;color:#7a9ccf;font-weight:400"> /חודש</span></div>' +
        '<div style="font-size:11px;color:#7a9ccf;margin-top:4px">' + (d.financeRep ? 'נציג מימון: ' + d.financeRep + ' · ' : '') + dateStr + '</div>' +
      '</div>' +
      '<div style="padding:8px 14px;border-top:1px solid #243550;text-align:center">' +
        '<button onclick="deleteArchiveDeal(' + i + ')" style="background:#7f1d1d;color:#fca5a5;border:none;border-radius:8px;padding:6px 18px;font-family:\'Heebo\',sans-serif;font-size:13px;font-weight:700;cursor:pointer;width:100%">מחק מהארכיון</button>' +
      '</div>' +
    '</div>';

function deleteArchiveDeal(i) {
  var arch = JSON.parse(localStorage.getItem('anak-archive') || '[]');
  arch.splice(i, 1);
  localStorage.setItem('anak-archive', JSON.stringify(arch));
  fbSet('/archive', arch);
  renderDealsArchive();
}

function openArchivedDeal(i) {
  var arch = JSON.parse(localStorage.getItem('anak-archive') || '[]');
  var d = arch[i];
  if (!d) return;
  var chosen = null;
  if (d.approvalPlans) d.approvalPlans.forEach(function(p){ if (p.chosen) chosen = p; });
  function r(lbl, val) { return val ? '<div class="detail-row"><span class="detail-lbl">' + lbl + '</span><span class="detail-val">' + val + '</span></div>' : ''; }
  var html = '';
  html += r('שם לקוח', d.customer);
  html += r('טלפון', d.phone);
  html += r('נציג מכירות', d.rep);
  html += r('נציג מימון', d.financeRep);
  html += r('רכב חדש', d.newCar);
  html += r('מספר רישוי', d.newPlate);
  if (d.newPrice) html += r('מחיר רכב', fmt(d.newPrice));
  if (d.tradeIn)  html += r('זיכוי טרייד אין', fmt(d.tradeIn));
  if (d.oldLoan)  html += r('חוב מימון ישן', fmt(d.oldLoan));
  if (d.cash)     html += r('כסף מהלקוח', fmt(d.cash));
  if (d.finance)  html += r('סכום מימון', fmt(d.finance));
  if (d.monthly)  html += r('החזר חודשי', fmt(d.monthly));
  if (chosen) {
    html += '<div style="height:1px;background:#dce6f5;margin:8px 0"></div>';
    html += r('חברת מימון נבחרת', chosen.company);
    html += r('סכום מאושר', chosen.amount);
    if (chosen.rate) html += r('ריבית', chosen.rate + '%');
  }
  html += r('סטטוס', d.dealStatus);
  document.getElementById('arch-modal-content').innerHTML = html;
  document.getElementById('arch-modal-title').textContent = (d.customer || 'עסקה') + ' — ארכיון';
  document.getElementById('arch-modal').style.display = 'flex';
}

(function initPage() {
  var params = new URLSearchParams(location.search);
  var dealParam = params.get('deal');
  if (dealParam !== null) {
    var idx = parseInt(dealParam);
    renderBar();
    openDealPanel(idx);
    // מנע חזרה לגריד עם כפתור הדפדפן
    history.pushState(null, '', location.href);
    window.addEventListener('popstate', function() {
      location.replace('quotes.html');
    });
    return;
  }
  // טען מ-Firebase ואז האזן לשינויים בזמן אמת
  fetch(FB_URL + '/deals.json')
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data && Array.isArray(data) && data.length) {
        localStorage.setItem('anak-deals', JSON.stringify(data));
      }
      renderBar();
    })
    .catch(function(){ renderBar(); });

  var _fbEs = new EventSource(FB_URL + '/deals.json');
  _fbEs.addEventListener('put', function(e) {
    try {
      var payload = JSON.parse(e.data);
      if (payload && payload.data && Array.isArray(payload.data)) {
        localStorage.setItem('anak-deals', JSON.stringify(payload.data));
        renderBar();
        if (typeof selectedIdx !== 'undefined' && selectedIdx >= 0 && document.getElementById('split-panel').style.display !== 'none') renderDetail();
      }
    } catch(err){}
  });
})();

(function initDealsArchiveBadge(){
  fetch(FB_URL + '/archive.json')
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data && Array.isArray(data)) {
        localStorage.setItem('anak-archive', JSON.stringify(data));
      }
      var arch = JSON.parse(localStorage.getItem('anak-archive') || '[]');
      var badge = document.getElementById('deals-archive-badge');
      if (badge) badge.textContent = arch.length;
    }).catch(function(){
      var arch = JSON.parse(localStorage.getItem('anak-archive') || '[]');
      var badge = document.getElementById('deals-archive-badge');
      if (badge) badge.textContent = arch.length;
    });
})();
</script>
