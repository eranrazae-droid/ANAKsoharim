<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>מימונים בתהליך — ענק הרכבים</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ענק הרכבים">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0d1f3c">
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#f0f4fa;color:#0d1f3c;min-height:100vh}

.hdr{background:#0d1f3c;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-size:18px;font-weight:900;color:#fff}
.hdr-logo span{color:#c9a227}
.hdr-title{font-size:13px;color:#7a9ccf;margin-top:2px}

/* גריד חלוניות עסקאות */
.deals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:16px;background:#f0f4fa;border-bottom:1px solid #dce6f5}
.deal-card{background:#fff;border:2px solid #dce6f5;border-radius:14px;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(13,31,60,.06);transition:border-color .15s}
.deal-card:hover{border-color:#0ea5e9}
.deal-card.active{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.15)}
.deal-card-hdr{background:#0d1f3c;padding:10px 12px}
.deal-card-name{font-size:14px;font-weight:900;color:#fff}
.deal-card-status{font-size:10px;color:#7a9ccf;margin-top:3px;font-weight:600}
.deal-card-body{padding:10px 12px}
.deal-card-monthly{font-size:20px;font-weight:900;color:#1a56db}
.deal-card-car{font-size:11px;font-weight:700;background:#fde047;color:#000;border-radius:4px;padding:2px 6px;display:inline-block;margin-top:4px}

/* split layout */
.split{display:flex;gap:0;min-height:calc(100vh - 120px)}

/* ימין — פרטי הצעה — בדיוק חצי מסך */
.panel-right{width:50%;padding:20px;border-left:1px solid #dce6f5;overflow-y:auto;margin-right:auto}

/* שמאל — פאנל פעולה — חצי מסך */
.panel-left{width:50%;padding:20px;background:#fff;display:flex;flex-direction:column;gap:12px}

.section-title{font-size:11px;font-weight:700;color:#5a7aa5;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}

.detail-card{background:#fff;border:1px solid #dce6f5;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0f4fa}
.detail-row:last-child{border-bottom:none}
.detail-lbl{font-size:12px;color:#7a9ab8;font-weight:600}
.detail-val{font-size:14px;font-weight:900;color:#0d1f3c}
.detail-val.big{font-size:20px;color:#1a56db}
.detail-val.gold{color:#c9a227}

.action-btn{width:100%;border:none;border-radius:12px;padding:16px;font-family:'Heebo',sans-serif;font-size:16px;font-weight:900;cursor:pointer}
.action-btn.green{background:#16a34a;color:#fff;box-shadow:0 4px 14px rgba(22,163,74,.25)}
.action-btn.red{background:#fff0f0;color:#e02d2d;border:1.5px solid #ffd6d6}

.approval-form{background:#f5f8ff;border:1px solid #dce6f5;border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px}
.approval-form label{font-size:11px;font-weight:700;color:#5a7aa5;display:block;margin-bottom:3px}
.approval-form input{width:100%;border:1.5px solid #dce6f5;border-radius:8px;padding:10px 12px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;color:#0d1f3c;outline:none;background:#fff}
.approval-form input:focus{border-color:#16a34a}
.save-approval-btn{background:#16a34a;color:#fff;border:none;border-radius:8px;padding:12px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;width:100%}

.empty-state{text-align:center;padding:80px 20px;color:#7a9ab8;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:18px;font-weight:700;color:#5a7aa5;margin-bottom:6px}
.empty-sub{font-size:14px;color:#a0b4cc}

@media(max-width:640px){
  .split{flex-direction:column}
  .panel-left{width:100%;border-top:1px solid #dce6f5}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">ענק <span>הרכבים</span></div>
    <div class="hdr-title">מימונים בתהליך</div>
  </div>
  <a href="index.html" style="color:#7a9ccf;font-size:13px;font-weight:700;text-decoration:none;background:#1a2f54;padding:8px 16px;border-radius:8px;">→ דף הבית</a>
</div>

<!-- גריד חלוניות עסקאות -->
<div class="deals-grid" id="deals-bar"></div>

<div class="split" id="split-panel" style="display:none">
  <!-- פרטי הצעה — ימין -->
  <div class="panel-right" id="panel-right">
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-text">אין עסקאות פעילות</div>
      <div class="empty-sub">לחץ "התקדם לעסקה" בהצעת מחיר כדי להוסיף</div>
    </div>
  </div>

  <!-- פאנל פעולה — שמאל -->
  <div class="panel-left" id="panel-left" style="display:none">
    <div class="section-title">פעולות עסקה</div>

    <button class="action-btn green" onclick="toggleApproval()">🏦 הוקמה הצעה ב...</button>

    <div class="approval-form" id="approval-form" style="display:none">
      <div>
        <label>חברת מימון</label>
        <input type="text" id="finance-company" placeholder="שם החברה..." oninput="saveApproval()">
      </div>
      <div>
        <label>סכום מאושר (₪)</label>
        <input type="number" id="approved-amount" placeholder="0" inputmode="numeric" min="0" onkeypress="return event.charCode>=48&&event.charCode<=57" oninput="this.value=this.value.replace(/[^0-9]/g,'');saveApproval()">
      </div>
      <div>
        <label>אחוז ריבית מאושר (%)</label>
        <input type="number" id="approved-rate" placeholder="0.00" step="0.01" inputmode="decimal" min="0" onkeypress="return event.charCode>=48&&event.charCode<=57||event.charCode===46" oninput="this.value=this.value.replace(/[^0-9.]/g,'')">
      </div>
      <button class="save-approval-btn" onclick="saveAndShowSummary()">💾 שמור</button>
    </div>

    <!-- חלונית סיכום מסלול -->
    <div id="approval-summary" style="display:none;background:#0d1f3c;border-radius:14px;padding:16px;color:#fff">
      <div style="font-size:12px;color:#7a9ccf;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px">✓ פרטי מסלול שנשמר</div>
      <div id="summary-content"></div>
      <button onclick="choosePlan()" style="width:100%;margin-top:14px;background:#c9a227;color:#fff;border:none;border-radius:10px;padding:14px;font-family:'Heebo',sans-serif;font-size:16px;font-weight:900;cursor:pointer">⭐ בחירה במסלול זה</button>
    </div>

    <button class="action-btn red" onclick="deleteDeal()">🗑 מחיקת עסקה</button>
  </div>
</div>

<script>
var selectedIdx = 0;

function fmt(n){ return '₪ ' + Math.round(n||0).toLocaleString('he-IL'); }
function pad(n){ return n < 10 ? '0'+n : ''+n; }

function fmtElapsed(ms) {
  var s = Math.floor(ms / 1000);
  var h = Math.floor(s / 3600);
  var m = Math.floor((s % 3600) / 60);
  var sec = s % 60;
  var parts = [];
  if (h) parts.push(h + 'ש\'');
  parts.push(pad(m) + 'ד\'');
  parts.push(pad(sec) + 'ש"');
  return parts.join(' ');
}

function getDeals(){ return JSON.parse(localStorage.getItem('anak-deals') || '[]'); }
function saveDeals(d){ localStorage.setItem('anak-deals', JSON.stringify(d)); }

function selectDeal(i) {
  selectedIdx = i;
  document.getElementById('split-panel').style.display = 'flex';
  renderBar();
  renderDetail();
}

function renderBar() {
  var deals = getDeals();
  var el = document.getElementById('deals-bar');
  if (!deals.length) { el.innerHTML = '<span style="color:#7a9ab8;font-size:13px;padding:4px">אין עסקאות פעילות</span>'; return; }
  el.innerHTML = deals.map(function(d, i) {
    var status = d.dealStatus || 'טרם הוקמה הלוואה';
    return '<div class="deal-card' + (i === selectedIdx ? ' active' : '') + '" onclick="selectDeal(' + i + ')">' +
      '<div class="deal-card-hdr">' +
        '<div class="deal-card-name">' + (d.customer || 'לא ידוע') + '</div>' +
        '<div class="deal-card-status">' + status + '</div>' +
      '</div>' +
      '<div class="deal-card-body">' +
        '<div class="deal-card-monthly">₪ ' + Math.round(d.monthly||0).toLocaleString('he-IL') + '</div>' +
        (d.newCar ? '<div class="deal-card-car">' + d.newCar + '</div>' : '') +
        (d.financeRep ? '<div style="font-size:11px;color:#5a7aa5;margin-top:6px;font-weight:600">נציג: ' + d.financeRep + '</div>' : '') +
      '</div>' +
      '<div style="background:#0d1f3c;padding:8px 10px;display:grid;grid-template-columns:1fr 1fr;gap:6px">' +
        '<div style="background:#1a2f54;border-radius:8px;padding:6px 8px;text-align:center">' +
          '<div style="font-size:9px;color:#7a9ccf;font-weight:600;margin-bottom:2px">מאז הקמה</div>' +
          '<div class="timer-created" style="font-size:12px;font-weight:900;color:#4ade80;font-variant-numeric:tabular-nums" data-createdat="' + (d.createdAt||Date.now()) + '">' + fmtElapsed(Date.now()-(d.createdAt||Date.now())) + '</div>' +
        '</div>' +
        '<div style="background:#1a2f54;border-radius:8px;padding:6px 8px;text-align:center">' +
          '<div style="font-size:9px;color:#7a9ccf;font-weight:600;margin-bottom:2px">בסטטוס</div>' +
          '<div class="timer-status" style="font-size:12px;font-weight:900;color:#facc15;font-variant-numeric:tabular-nums" data-statusat="' + (d.statusChangedAt||d.createdAt||Date.now()) + '">' + fmtElapsed(Date.now()-(d.statusChangedAt||d.createdAt||Date.now())) + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderDetail() {
  var deals = getDeals();
  var right = document.getElementById('panel-right');
  var left  = document.getElementById('panel-left');

  if (!deals.length) {
    right.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">אין עסקאות פעילות</div><div class="empty-sub">לחץ "התקדם לעסקה" בהצעת מחיר</div></div>';
    left.style.display = 'none';
    return;
  }

  var d = deals[selectedIdx] || deals[0];
  left.style.display = 'flex';

  // פרטי לקוח
  var html = '<div class="section-title">פרטי לקוח</div>';
  html += '<div class="detail-card">';
  html += '<div class="detail-row"><span class="detail-lbl">שם לקוח</span><span class="detail-val">' + (d.customer || '—') + '</span></div>';
  html += '<div class="detail-row"><span class="detail-lbl">טלפון</span><span class="detail-val">' + (d.phone || '—') + '</span></div>';
  html += '<div class="detail-row"><span class="detail-lbl">נציג מכירות</span><span class="detail-val">' + (d.rep || '—') + '</span></div>';
  if (d.financeRep) html += '<div class="detail-row"><span class="detail-lbl">נציג מימון</span><span class="detail-val">' + d.financeRep + '</span></div>';
  html += '</div>';

  // רכב חדש
  if (d.newCar || d.newPlate) {
    html += '<div class="section-title">רכב חדש</div>';
    html += '<div class="detail-card">';
    if (d.newPlate) html += '<div class="detail-row"><span class="detail-lbl">מספר רישוי</span><span class="detail-val">' + d.newPlate + '</span></div>';
    if (d.newCar)   html += '<div class="detail-row"><span class="detail-lbl">פרטי רכב</span><span class="detail-val" style="background:#fde047;color:#000;padding:2px 8px;border-radius:5px">' + d.newCar + '</span></div>';
    if (d.newPrice) html += '<div class="detail-row"><span class="detail-lbl">מחיר</span><span class="detail-val">' + fmt(d.newPrice) + '</span></div>';
    html += '</div>';
  }

  // פרטי עסקה
  html += '<div class="section-title">פרטי עסקה</div>';
  html += '<div class="detail-card">';
  if (d.oldLoan)   html += '<div class="detail-row"><span class="detail-lbl">חוב מימון רכב ישן</span><span class="detail-val">' + fmt(d.oldLoan) + '</span></div>';
  if (d.newPrice)  html += '<div class="detail-row"><span class="detail-lbl">סה"כ עסקה</span><span class="detail-val">' + fmt(d.newPrice) + '</span></div>';
  if (d.cash)      html += '<div class="detail-row"><span class="detail-lbl">כסף שהלקוח מביא</span><span class="detail-val">' + fmt(d.cash) + '</span></div>';
  html += '<div class="detail-row"><span class="detail-lbl">סכום מימון</span><span class="detail-val big">' + fmt(d.finance || (d.newPrice - (d.cash||0))) + '</span></div>';
  html += '</div>';

  // החזר חודשי
  html += '<div class="detail-card" style="background:#0d1f3c;border-color:#0d1f3c">';
  html += '<div class="detail-row" style="border-color:#1a2f54"><span class="detail-lbl" style="color:#7a9ccf">החזר חודשי</span><span class="detail-val big" style="color:#fff;font-size:28px">' + fmt(d.monthly) + '</span></div>';
  if (d.status) html += '<div class="detail-row" style="border:none"><span class="detail-lbl" style="color:#7a9ccf">סטטוס</span><span style="background:#1a56db;color:#fff;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700">' + d.status + '</span></div>';
  html += '</div>';


  right.innerHTML = html;

  // שחזר ערכי טופס אישור
  document.getElementById('finance-company').value  = d.financeCompany  || '';
  document.getElementById('approved-amount').value  = d.approvedAmount  || '';
  document.getElementById('approved-rate').value    = d.approvedRate    || '';
  if (d.financeCompany || d.approvedAmount || d.approvedRate) {
    document.getElementById('approval-form').style.display = 'flex';
  }
}

function toggleApproval() {
  var f = document.getElementById('approval-form');
  f.style.display = f.style.display === 'none' ? 'flex' : 'none';
}

function saveAndShowSummary() {
  var company = document.getElementById('finance-company').value.trim();
  var amount  = document.getElementById('approved-amount').value;
  var rate    = document.getElementById('approved-rate').value;
  if (!company && !amount && !rate) { alert('יש למלא לפחות שדה אחד'); return; }

  // שמירה
  var deals = getDeals();
  if (!deals.length) return;
  var d = deals[selectedIdx] || deals[0];
  d.financeCompany = company;
  d.approvedAmount = parseFloat(amount) || 0;
  d.approvedRate   = parseFloat(rate)   || 0;
  deals[selectedIdx] = d;
  saveDeals(deals);

  // הצג סיכום — שורה אחת אופקית
  var html = '<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">';
  if (company) html += '<div><span style="color:#7a9ccf;font-size:11px;display:block;margin-bottom:2px">חברת מימון</span><span style="font-weight:900;font-size:16px;color:#fff">' + company + '</span></div>';
  if (amount)  html += '<div style="border-right:1px solid #2a4a7a;padding-right:18px"><span style="color:#7a9ccf;font-size:11px;display:block;margin-bottom:2px">סכום מאושר</span><span style="font-weight:900;font-size:16px;color:#c9a227">₪ ' + parseFloat(amount).toLocaleString('he-IL') + '</span></div>';
  if (rate)    html += '<div style="border-right:1px solid #2a4a7a;padding-right:18px"><span style="color:#7a9ccf;font-size:11px;display:block;margin-bottom:2px">ריבית מאושרת</span><span style="font-weight:900;font-size:16px;color:#38bdf8">' + rate + '%</span></div>';
  html += '</div>';
  document.getElementById('summary-content').innerHTML = html;
  document.getElementById('approval-summary').style.display = 'block';
  renderDetail();
}

function choosePlan() {
  var deals = getDeals();
  if (!deals.length) return;
  var d = deals[selectedIdx] || deals[0];
  d.chosenPlan = true;
  deals[selectedIdx] = d;
  saveDeals(deals);
  document.getElementById('approval-summary').style.backgroundColor = '#16a34a';
  var btn = document.getElementById('approval-summary').querySelector('button');
  if (btn) { btn.textContent = '✓ מסלול נבחר!'; btn.disabled = true; btn.style.background = '#fff'; btn.style.color = '#16a34a'; }
}

function saveApproval() {
  var deals = getDeals();
  if (!deals.length) return;
  var d = deals[selectedIdx] || deals[0];
  d.financeCompany = document.getElementById('finance-company').value;
  d.approvedAmount = parseFloat(document.getElementById('approved-amount').value) || 0;
  d.approvedRate   = parseFloat(document.getElementById('approved-rate').value)   || 0;
  deals[selectedIdx] = d;
  saveDeals(deals);
  renderDetail();
}

function deleteDeal() {
  if (!confirm('למחוק את העסקה?')) return;
  var deals = getDeals();
  deals.splice(selectedIdx, 1);
  saveDeals(deals);
  selectedIdx = 0;
  renderBar();
  renderDetail();
}

function tickTimers() {
  var now = Date.now();
  document.querySelectorAll('.timer-created').forEach(function(el) {
    el.textContent = fmtElapsed(now - parseInt(el.dataset.createdat, 10));
  });
  document.querySelectorAll('.timer-status').forEach(function(el) {
    el.textContent = fmtElapsed(now - parseInt(el.dataset.statusat, 10));
  });
}
setInterval(tickTimers, 1000);

renderBar();
</script>
</body>
</html>
