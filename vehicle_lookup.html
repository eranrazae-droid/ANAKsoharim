<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בדיקת רכב לפי לוחית רישוי — ענק הרכבים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#f0f2f8;color:#1a1a2e;min-height:100vh}

/* ── Header ── */
.site-header{background:#1a1a2e;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-size:20px;font-weight:900;color:#fff;text-decoration:none}.logo span{color:#c9a227}
.back-btn{background:#c9a227;color:#000;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;font-family:'Heebo',sans-serif;cursor:pointer;text-decoration:none}

.body{padding:24px;max-width:720px;margin:0 auto;padding-bottom:60px}

/* ── Search ── */
.search-box{background:#fff;border-radius:16px;padding:24px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.search-title{font-size:18px;font-weight:900;margin-bottom:16px}
.search-row{display:flex;gap:10px}
.plate-input{flex:1;padding:16px 20px;border:2px solid #e0e4ef;border-radius:12px;font-size:24px;font-weight:900;font-family:'Heebo',sans-serif;color:#1a1a2e;text-align:center;letter-spacing:4px;outline:none;direction:ltr;background:#f9faff;}
.plate-input:focus{border-color:#c9a227;background:#fff}
.plate-input::placeholder{font-size:14px;font-weight:400;letter-spacing:0;color:#bbb}
.search-btn{background:#c9a227;color:#000;border:none;border-radius:12px;padding:16px 28px;font-size:16px;font-weight:900;font-family:'Heebo',sans-serif;cursor:pointer;white-space:nowrap}
.search-btn:hover{background:#b8901f}

/* ── Plate visual ── */
.plate-visual{display:inline-flex;align-items:center;background:#fff;border:3px solid #1a1a2e;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.2);margin-bottom:10px;}
.plate-blue{background:#003399;color:#fff;padding:6px 8px;font-size:11px;font-weight:900;writing-mode:vertical-rl;text-align:center;letter-spacing:1px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:28px;}
.plate-flag{font-size:14px;}.plate-il{font-size:9px;letter-spacing:0;}
.plate-number{padding:8px 18px;font-size:28px;font-weight:900;letter-spacing:4px;color:#1a1a2e;direction:ltr;min-width:160px;text-align:center;}

/* ── Report card ── */
.report-card{border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12);}

/* Car header */
.car-header{background:linear-gradient(135deg,#1a1a2e 0%,#252545 100%);padding:22px 24px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px;}
.car-name{color:#fff;font-size:22px;font-weight:900;margin-bottom:3px;}
.car-sub{color:#9ba3c0;font-size:13px;}

/* Tokef badge */
.tokef-badge{padding:10px 18px;border-radius:12px;font-size:13px;font-weight:900;text-align:center;min-width:130px;flex-shrink:0;}
.tokef-ok{background:#dcfce7;color:#065f46;}
.tokef-warn{background:#fef3c7;color:#92400e;}
.tokef-expired{background:#fee2e2;color:#991b1b;}

/* ── Score row ── */
.score-row{display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border-bottom:1px solid #f0f2fa;}
.score-card{padding:14px 12px;text-align:center;border-left:1px solid #f0f2fa;}
.score-card:first-child{border-left:none;}
.score-icon{font-size:20px;margin-bottom:4px;}
.score-val{font-size:18px;font-weight:900;color:#1a1a2e;line-height:1.1;}
.score-lbl{font-size:9px;font-weight:700;color:#9ba3c0;text-transform:uppercase;letter-spacing:.05em;margin-top:3px;}
.score-val.green{color:#065f46;}
.score-val.red{color:#dc2626;}
.score-val.gold{color:#c9a227;}
.score-val.orange{color:#d97706;}

/* ── Info grid ── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;background:#fff;}
.info-card{padding:14px 18px;border-bottom:1px solid #f0f2fa;border-left:1px solid #f0f2fa;display:flex;flex-direction:column;gap:3px;}
.info-card:nth-child(even){border-left:none;}
.info-card.full{grid-column:1/-1;border-left:none;}
.info-label{font-size:10px;color:#9ba3c0;font-weight:700;letter-spacing:.04em;}
.info-val{font-size:15px;font-weight:800;color:#1a1a2e;line-height:1.3;}
.info-val.green{color:#065f46;}
.info-val.red{color:#dc2626;}
.info-val.gold{color:#c9a227;}
.info-val.sm{font-size:13px;}

/* Section divider */
.sec-div{background:#f9faff;padding:11px 18px;font-size:11px;font-weight:900;color:#1a1a2e;border-bottom:1px solid #f0f2fa;border-top:1px solid #f0f2fa;grid-column:1/-1;display:flex;align-items:center;gap:8px;letter-spacing:.02em;}
.sec-div small{font-weight:400;color:#9ba3c0;font-size:10px;margin-right:auto;}

/* ── Insights ── */
.insight-list{grid-column:1/-1;padding:6px 18px 14px;border-bottom:1px solid #f0f2fa;background:#fff;display:flex;flex-direction:column;gap:7px;}
.insight-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:10px;font-size:13px;font-weight:600;}
.insight-item.ok{background:#f0fdf4;color:#166534;}
.insight-item.warn{background:#fffbeb;color:#92400e;}
.insight-item.alert{background:#fef2f2;color:#991b1b;}
.insight-item.info{background:#f0f9ff;color:#1e40af;}
.insight-icon{font-size:16px;flex-shrink:0;margin-top:1px;}

/* ── Owners ── */
.owners-bar{grid-column:1/-1;padding:16px 18px;border-bottom:1px solid #f0f2fa;background:#fff;}
.owners-label{font-size:10px;color:#9ba3c0;font-weight:700;margin-bottom:10px;}
.owners-dots{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.owner-dot{width:36px;height:36px;border-radius:50%;background:#e0e4ef;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#1a1a2e;}
.owner-dot.current{background:#c9a227;color:#000;box-shadow:0 0 0 3px #fef3c7;}

/* ── Mileage timeline ── */
.km-section{grid-column:1/-1;padding:16px 18px;border-bottom:1px solid #f0f2fa;background:#fff;}
.km-label{font-size:10px;color:#9ba3c0;font-weight:700;margin-bottom:14px;}
.km-list{position:relative;padding-right:24px;}
.km-list::before{content:'';position:absolute;right:5px;top:8px;width:2px;bottom:8px;background:#e0e4ef;}
.km-entry{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;position:relative;}
.km-entry:last-child{margin-bottom:0;}
.km-dot{width:9px;height:9px;border-radius:50%;background:#c9a227;flex-shrink:0;margin-top:5px;position:absolute;right:-24px;}
.km-dot.latest{background:#1a1a2e;box-shadow:0 0 0 3px #e0e4ef;}
.km-date{font-size:11px;color:#9ba3c0;font-weight:600;margin-bottom:2px;}
.km-val{font-size:16px;font-weight:900;color:#1a1a2e;}
.km-delta{font-size:11px;color:#9ba3c0;margin-top:2px;}
.km-stats{margin-top:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.km-stat{background:#f9faff;border-radius:10px;padding:10px 12px;text-align:center;}
.km-stat strong{display:block;font-size:16px;font-weight:900;color:#1a1a2e;}
.km-stat span{font-size:10px;color:#9ba3c0;font-weight:700;}

/* ── WLTP / Fuel ── */
.wltp-row{grid-column:1/-1;display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid #f0f2fa;background:#fff;}
.wltp-cell{padding:14px 16px;border-left:1px solid #f0f2fa;text-align:center;}
.wltp-cell:first-child{border-left:none;}

/* ── Recalls ── */
.recalls-section{grid-column:1/-1;padding:0 18px 16px;border-bottom:1px solid #f0f2fa;background:#fff;}
.recall-item{padding:12px 14px;border-radius:10px;background:#fef2f2;margin-bottom:8px;border-right:3px solid #dc2626;}
.recall-item:last-child{margin-bottom:0;}
.recall-title{font-size:13px;font-weight:800;color:#991b1b;margin-bottom:3px;}
.recall-meta{font-size:11px;color:#9ba3c0;font-weight:600;}
.recalls-empty{font-size:13px;color:#065f46;background:#f0fdf4;padding:10px 14px;border-radius:10px;font-weight:700;}

/* ── Safety ── */
.safety-section{grid-column:1/-1;padding:16px 18px;border-bottom:1px solid #f0f2fa;background:#fff;}
.safety-label{font-size:10px;color:#9ba3c0;font-weight:700;margin-bottom:10px;}
.safety-squares{display:flex;gap:5px;margin-bottom:6px;}
.safety-sq{width:24px;height:24px;border-radius:6px;background:#e0e4ef;}
.safety-sq.fill{background:#c9a227;}
.safety-row{display:flex;align-items:center;gap:10px;}
.safety-num{font-size:26px;font-weight:900;color:#1a1a2e;}
.safety-sub{font-size:12px;color:#9ba3c0;}

/* Share bar */
.share-bar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.share-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;font-family:'Heebo',sans-serif;cursor:pointer;border:none;text-decoration:none;}
.share-btn.wa{background:#25D366;color:#fff;}
.share-btn.link{background:#f0f2f8;color:#1a1a2e;border:1px solid #e0e4ef;}

/* Source */
.source-note{grid-column:1/-1;padding:10px 18px;font-size:11px;color:#c0c7d4;background:#fafbff;border-top:1px solid #f0f2fa;}

.empty{text-align:center;padding:48px 20px;color:#aaa;background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);}
.empty-icon{font-size:48px;display:block;margin-bottom:12px;}
.loading{text-align:center;padding:40px;color:#7a839a;font-size:15px;background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);}
.loading-sub{font-size:12px;color:#bbb;margin-top:6px;}

@media(max-width:500px){
  .search-row{flex-direction:column;}
  .body{padding:16px;}
  .info-grid{grid-template-columns:1fr;}
  .info-card{border-left:none;}
  .car-header{flex-direction:column;}
  .plate-number{font-size:22px;}
  .score-row{grid-template-columns:1fr 1fr;}
  .score-card{border-bottom:1px solid #f0f2fa;}
  .wltp-row{grid-template-columns:1fr;}
  .wltp-cell{border-left:none;border-bottom:1px solid #f0f2fa;}
  .km-stats{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<div class="site-header">
  <a class="logo" href="/">ענק <span>הרכבים</span></a>
  <a class="back-btn" href="/">← חזור למלאי</a>
</div>

<div class="body">
  <div class="search-box">
    <div class="search-title">🔍 בדיקת רכב לפי לוחית רישוי</div>
    <div class="search-row">
      <input class="plate-input" type="tel" id="plateInput" placeholder="הכנס מספר רישוי..." maxlength="8" inputmode="numeric">
      <button class="search-btn" onclick="lookupPlate()">חפש</button>
    </div>
  </div>
  <div id="result">
    <div class="empty"><span class="empty-icon">🚗</span>הכנס מספר רישוי לקבלת פרטי הרכב ממשרד התחבורה</div>
  </div>
</div>

<script>
document.getElementById('plateInput').addEventListener('keydown',function(e){if(e.key==='Enter')lookupPlate();});

var urlParams = new URLSearchParams(window.location.search);
var plateParm = urlParams.get('plate');
if(plateParm){document.getElementById('plateInput').value=plateParm;window.addEventListener('load',lookupPlate);}

var HE_MONTHS=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function fv(v){return (v!==undefined&&v!==null&&v!==''&&v!=='None'&&String(v).trim()!=='') ? v : null;}
function fs(v){var r=fv(v);return r!==null?String(r):'—';}
function num(v){var n=parseFloat(v);return isNaN(n)?null:n;}

function formatDate(s){
  if(!s||s==='None')return '—';
  var d=new Date(s);if(isNaN(d))return s;
  return d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function monthYear(d){return HE_MONTHS[d.getMonth()]+' '+d.getFullYear();}

function tokefStatus(s){
  if(!s||s==='None')return{cls:'',text:'לא ידוע',days:null};
  var d=new Date(s),now=new Date();
  var diff=Math.round((d-now)/(1000*60*60*24));
  if(diff<0) return{cls:'tokef-expired',text:'פג תוקף ❌',days:diff};
  if(diff<60)return{cls:'tokef-warn',text:'פג בקרוב ⚠️',days:diff};
  return{cls:'tokef-ok',text:'בתוקף ✓',days:diff};
}

function vehicleAgeYears(s){
  if(!s||s==='None')return null;
  var d=new Date(s);if(isNaN(d))return null;
  var now=new Date();
  var y=now.getFullYear()-d.getFullYear(),m=now.getMonth()-d.getMonth();
  if(m<0){y--;m+=12;}
  return{years:y,months:m,str:y===0?m+' חודשים':y+(m>0?' שנים ו-'+m+' חודשים':' שנים')};
}

function baalutLabel(v){
  var map={'1':'פרטי','2':'עסקי','3':'ממשלתי','4':'ליסינג','5':'השכרה'};
  return map[String(v)]||fs(v);
}

function ownersHtml(n){
  var num=parseInt(n)||1,h='';
  for(var i=1;i<=Math.min(num,8);i++)h+='<div class="owner-dot'+(i===num?' current':'')+'">'+( i===1?'👤':i)+'</div>';
  if(num>8)h+='<div style="color:#9ba3c0;font-size:13px;font-weight:700;">+'+(num-8)+'</div>';
  return h;
}

function makePlate(plate){
  var fmt=plate.length===7?plate.slice(0,3)+'-'+plate.slice(3,5)+'-'+plate.slice(5):plate.slice(0,2)+'-'+plate.slice(2,5)+'-'+plate.slice(5);
  return '<div class="plate-visual"><div class="plate-blue"><span class="plate-flag">🇮🇱</span><span class="plate-il">IL</span></div><div class="plate-number">'+fmt+'</div></div>';
}

function card(lbl,val,cls){return '<div class="info-card"><div class="info-label">'+lbl+'</div><div class="info-val'+(cls?' '+cls:'')+'">'+(val||'—')+'</div></div>';}
function cardSm(lbl,val){return val&&val!=='—'?'<div class="info-card"><div class="info-label">'+lbl+'</div><div class="info-val sm">'+val+'</div></div>':'';}

/* All known field names → Hebrew labels. null = skip silently */
var FIELD_LABELS = {
  '_id':null,'_full_text':null,'mispar_rechev':null,
  'tozeret_cd':null,'degem_cd':null,'sug_delek_cd':null,'hanaa_cd':null,
  'tozeret_nm':'יצרן','kinuy_mishari':'דגם מסחרי','degem_nm':'שם דגם',
  'shnat_yitzur':'שנת ייצור','tzeva_rechev':'צבע','sug_delek_nm':'סוג דלק',
  'eretz_yitzur_nm':'ארץ ייצור','mivne_mechonit_nm':'מבנה רכב',
  'sug_rechev_nm':'סוג רכב','ramat_gimur':'רמת גימור',
  'nefach_manoa':'נפח מנוע (סמ"ק)','kosher_neto':'הספק (כ"ס)',
  'koah_sus':'הספק (כ"ס)','mishkal_ezem':'משקל עצמי (ק"ג)',
  'mishkal_kolel':'משקל כולל (ק"ג)','mispar_moshavim':'מספר מושבים',
  'mispar_dlatot':'מספר דלתות','hanaa_nm':'הנעה',
  'technologiat_rig':'טכנולוגיית מנוע','degem_manoa':'דגם מנוע',
  'kvutzat_agra':'קבוצת אגרה','kvutzat_zihum':'קבוצת זיהום',
  'tokef_dt':'תוקף רישיון','moed_aliya_lakvish':'עלייה לכביש',
  'mivchan_acharon_dt':'מבחן אחרון','baalut':null,
  'mispar_baalim':null,'ramat_eivzur_betihuty':null,
};

/* Ordered list of basic-info fields (always shown first if present) */
var BASIC_FIELDS = ['tozeret_nm','kinuy_mishari','shnat_yitzur','eretz_yitzur_nm','tzeva_rechev','sug_delek_nm','mivne_mechonit_nm','sug_rechev_nm','ramat_gimur','degem_nm'];
/* Ordered list of license fields */
var LICENSE_FIELDS = ['moed_aliya_lakvish','mivchan_acharon_dt','tokef_dt','kvutzat_zihum','kvutzat_agra'];
/* Ordered list of tech fields */
var TECH_FIELDS = ['nefach_manoa','kosher_neto','koah_sus','mishkal_ezem','mishkal_kolel','mispar_moshavim','mispar_dlatot','hanaa_nm','technologiat_rig','degem_manoa'];

function buildFieldCards(c, fieldList, shownSet, colourFn){
  var html = '';
  var usedLabels = new Set();
  fieldList.forEach(function(k){
    var v = fv(c[k]);
    if(v === null) return;
    var lbl = FIELD_LABELS[k];
    if(lbl === null || lbl === undefined) return; // skip
    if(usedLabels.has(lbl)) return; // deduplicate same label
    usedLabels.add(lbl);
    shownSet.add(k);
    var cls = colourFn ? colourFn(k,v) : '';
    html += card(lbl, String(v), cls);
  });
  return html;
}

/* Show any API field not yet displayed */
function buildCatchAll(c, shownSet){
  var html = '';
  Object.keys(c).forEach(function(k){
    if(shownSet.has(k)) return;
    if(FIELD_LABELS[k] === null) return; // explicitly skipped
    var v = fv(c[k]);
    if(v === null) return;
    var lbl = FIELD_LABELS[k] || k; // fallback to raw key name
    html += card(lbl, String(v));
    shownSet.add(k);
  });
  return html;
}

function scoreCard(icon,val,lbl,cls){
  return '<div class="score-card"><div class="score-icon">'+icon+'</div><div class="score-val'+(cls?' '+cls:'')+'" style="font-size:'+(val.length>6?'14px':'18px')+'">'+val+'</div><div class="score-lbl">'+lbl+'</div></div>';
}

/* ── Insights ── */
function buildInsights(c, kmAvg){
  var items=[];
  var owners=parseInt(c.mispar_baalim)||1;
  var age=vehicleAgeYears(c.moed_aliya_lakvish);
  var ts=tokefStatus(c.tokef_dt);

  // Tokef alert
  if(ts.days!==null&&ts.days<0) items.push({t:'alert',icon:'🔴',msg:'תוקף הטסט פג לפני '+Math.abs(ts.days)+' ימים — הרכב אינו חוקי לנסיעה'});
  else if(ts.days!==null&&ts.days<30) items.push({t:'warn',icon:'⚠️',msg:'תוקף הטסט פג בעוד '+ts.days+' ימים בלבד'});
  else if(ts.days!==null&&ts.days<90) items.push({t:'warn',icon:'⏰',msg:'הטסט פג בעוד כ-'+Math.round(ts.days/30)+' חודשים'});

  // Age
  if(age) items.push({t:'info',icon:'📅',msg:'הרכב על הכביש '+age.str+' (עלה לכביש '+formatDate(c.moed_aliya_lakvish)+')'});

  // Ownership duration
  if(age&&owners>0){
    var avgMonths=Math.round((age.years*12+age.months)/owners);
    var avgStr=avgMonths>=12?Math.floor(avgMonths/12)+' שנים'+(avgMonths%12>0?' ו-'+avgMonths%12+' חודשים':''):avgMonths+' חודשים';
    items.push({t:'info',icon:'👥',msg:''+owners+' בעלים בסך הכל — בממוצע '+avgStr+' לכל בעלים'});
  }

  // Mileage comparison
  if(kmAvg&&age&&age.years>0){
    var ISRAEL_AVG_KM=17000;
    var expectedKm=Math.round(age.years*ISRAEL_AVG_KM);
    var pct=Math.round((kmAvg-ISRAEL_AVG_KM)/ISRAEL_AVG_KM*100);
    if(pct>30) items.push({t:'warn',icon:'📊',msg:'ממוצע שנתי של '+kmAvg.toLocaleString('he-IL')+' ק"מ — גבוה ב-'+pct+'% מממוצע ישראלי ('+ISRAEL_AVG_KM.toLocaleString('he-IL')+' ק"מ/שנה)'});
    else if(pct<-20) items.push({t:'ok',icon:'📊',msg:'ממוצע שנתי של '+kmAvg.toLocaleString('he-IL')+' ק"מ — נמוך ב-'+Math.abs(pct)+'% מהממוצע הישראלי — ריצה נמוכה'});
    else items.push({t:'ok',icon:'📊',msg:'ממוצע שנתי של '+kmAvg.toLocaleString('he-IL')+' ק"מ — תואם את הממוצע הישראלי'});
  }

  // Ownership type
  var baal=fv(c.baalut);
  if(baal==='4') items.push({t:'warn',icon:'🏷️',msg:'רכב שהיה בליסינג — בדוק היסטוריה מלאה'});
  else if(baal==='5') items.push({t:'warn',icon:'🏷️',msg:'רכב שהיה בהשכרה — צפויה ריצה גבוהה'});
  else if(baal==='1'&&owners===1) items.push({t:'ok',icon:'✅',msg:'רכב בבעלות פרטית ראשונה — יד ראשונה'});

  // Safety level
  var sl=parseInt(c.ramat_eivzur_betihuty);
  if(!isNaN(sl)){
    if(sl>=6) items.push({t:'ok',icon:'🛡️',msg:'רמת ציוד בטיחות גבוהה ('+sl+'/7)'});
    else if(sl<=3) items.push({t:'warn',icon:'🛡️',msg:'רמת ציוד בטיחות נמוכה ('+sl+'/7)'});
  }

  if(!items.length) return '';
  return '<div class="sec-div">💡 תובנות</div>'+
    '<div class="insight-list">'+
    items.map(function(it){return '<div class="insight-item '+it.t+'"><span class="insight-icon">'+it.icon+'</span><span>'+it.msg+'</span></div>';}).join('')+
    '</div>';
}

/* ── Mileage timeline ── */
function renderMileageTimeline(records){
  if(!records||!records.length)return{html:'',avgKm:null};
  var s=records[0];
  var kmF=['km_counter','km','merhak_rishum','odometer','merhak','odo'].find(function(k){return fv(s[k])!==null;});
  var dtF=['moed_haavara','taarich_tokef','test_date','rishui_dt','taarich'].find(function(k){return fv(s[k])!==null;});
  var hasYM=!dtF&&fv(s.shnat_tokef);
  if(!kmF)return{html:'',avgKm:null};

  var entries=records.map(function(r){
    var km=parseInt(r[kmF])||0;
    var date=null;
    if(dtF&&r[dtF]) date=new Date(r[dtF]);
    else if(hasYM&&r.shnat_tokef){var m=r.chodesh_tokef||'01';date=new Date(r.shnat_tokef+'-'+String(m).padStart(2,'0')+'-01');}
    if(!date||isNaN(date)||km<100)return null;
    return{km:km,date:date};
  }).filter(Boolean).sort(function(a,b){return a.date-b.date;});

  if(!entries.length)return{html:'',avgKm:null};

  var listHtml=entries.map(function(e,i){
    var isL=(i===entries.length-1);
    var prev=i>0?entries[i-1]:null;
    var delta='';
    if(prev){var dk=e.km-prev.km,dy=(e.date-prev.date)/(1000*60*60*24*365);if(dk>0&&dy>0)delta='<div class="km-delta">+'+dk.toLocaleString('he-IL')+' ק"מ · '+Math.round(dk/dy).toLocaleString('he-IL')+' ק"מ/שנה</div>';}
    return '<div class="km-entry"><div class="km-dot'+(isL?' latest':'')+'"></div><div><div class="km-date">'+monthYear(e.date)+' — טסט רכב</div><div class="km-val">'+e.km.toLocaleString('he-IL')+' ק"מ</div>'+delta+'</div></div>';
  }).join('');

  var statsHtml='',avgKm=null;
  if(entries.length>=2){
    var f0=entries[0],fl=entries[entries.length-1];
    var ty=(fl.date-f0.date)/(1000*60*60*24*365);
    if(ty>0.5){
      avgKm=Math.round((fl.km-f0.km)/ty);
      var proj=fl.km+Math.round(avgKm*((new Date()-fl.date)/(1000*60*60*24*365)));
      statsHtml='<div class="km-stats">'+
        '<div class="km-stat"><strong>'+avgKm.toLocaleString('he-IL')+' ק"מ</strong><span>ממוצע שנתי</span></div>'+
        '<div class="km-stat"><strong>'+fl.km.toLocaleString('he-IL')+' ק"מ</strong><span>בטסט האחרון</span></div>'+
        '<div class="km-stat"><strong>~'+proj.toLocaleString('he-IL')+' ק"מ</strong><span>הערכה להיום</span></div>'+
      '</div>';
    }
  }
  return{html:'<div class="km-section"><div class="km-label">היסטוריית קילומטרז\' לפי טסטים</div><div class="km-list">'+listHtml+'</div>'+statsHtml+'</div>',avgKm:avgKm};
}

/* ── WLTP ── */
function renderWltp(w){
  if(!w)return'';
  var cells=[];
  var fields=[['tzrichat_delek_mishuv','⛽ צריכה משולבת','ל׳/100ק"מ'],['plitatCO2','🌫️ CO2','גר/ק"מ'],['tevin_nesia_chashmal','⚡ טווח חשמלי','ק"מ'],['tzrichat_chashmal_mishuv','⚡ צריכת חשמל','kWh/100ק"מ']];
  fields.forEach(function(fd){
    var v=fv(w[fd[0]]);
    if(v!==null)cells.push('<div class="wltp-cell"><div class="info-label">'+fd[0]==='tzrichat_delek_mishuv'&&fv(w.tzrichat_chashmal_mishuv)!==null?'⛽ צריכה':fd[1]+'</div><div class="info-val" style="font-size:18px;">'+v+'</div><div style="font-size:10px;color:#9ba3c0;font-weight:600;margin-top:2px;">'+fd[2]+'</div></div>');
  });
  if(!cells.length)return'';
  return'<div class="sec-div">⛽ צריכת דלק / פליטות (WLTP)</div><div class="wltp-row">'+cells.join('')+'</div>';
}

/* ── Recalls ── */
function renderRecalls(records, tozeret, kinuy){
  var topDiv='<div class="sec-div">🔔 ריקולים <small>הודעות יצרן לתיקון</small></div><div class="recalls-section" style="padding-top:14px;">';
  if(!records||!records.length){
    return topDiv+'<div class="recalls-empty">✅ לא נמצאו ריקולים פתוחים עבור '+tozeret+' '+kinuy+'</div></div>';
  }
  var items=records.slice(0,5).map(function(r){
    var title=fv(r.recall_title)||fv(r.teur_takala)||fv(r.nosheh)||fv(r.recall_description)||'ריקול';
    var date=fv(r.moed)||fv(r.taarich)||'';
    var num=fv(r.mispar_recall)||fv(r.recall_num)||'';
    return '<div class="recall-item"><div class="recall-title">'+title+'</div><div class="recall-meta">'+(date?'תאריך: '+formatDate(date)+' · ':'' )+(num?'מספר: '+num:'')+'</div></div>';
  }).join('');
  return topDiv+items+'</div>';
}

/* ── Safety ── */
function renderSafety(level){
  var lv=parseInt(level);
  if(isNaN(lv))return'';
  var max=7,sqs='';
  for(var i=0;i<max;i++)sqs+='<div class="safety-sq'+(i<lv?' fill':'')+'"></div>';
  return '<div class="safety-section"><div class="safety-label">רמת ציוד בטיחות (קוד משרד התחבורה)</div>'+
    '<div class="safety-squares">'+sqs+'</div>'+
    '<div class="safety-row"><div class="safety-num">'+lv+' / '+max+'</div><div class="safety-sub">'+
    (lv>=6?'ציוד בטיחות מתקדם':lv>=4?'ציוד בטיחות סביר':'ציוד בטיחות בסיסי')+
    '</div></div></div>';
}

/* ── Share ── */
function copyLink(){
  var plate=document.getElementById('plateInput').value.trim().replace(/[-\s]/g,'');
  var url=window.location.origin+window.location.pathname+'?plate='+plate;
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){alert('הקישור הועתק!');});}
  else{var t=document.createElement('input');t.value=url;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);alert('הקישור הועתק!');}
}

/* ── Main render ── */
function renderResult(c, testRecords, wData, recallRecords){
  var plate=document.getElementById('plateInput').value.trim().replace(/[-\s]/g,'');
  var ts=tokefStatus(c.tokef_dt);
  var owners=parseInt(c.mispar_baalim)||1;
  var baalutTxt=baalutLabel(c.baalut);
  var age=vehicleAgeYears(c.moed_aliya_lakvish);
  var mil=renderMileageTimeline(testRecords);
  var insights=buildInsights(c, mil.avgKm);
  var wltp=renderWltp(wData);
  var safety=renderSafety(c.ramat_eivzur_betihuty);
  var recalls=renderRecalls(recallRecords, fs(c.tozeret_nm), fs(c.kinuy_mishari));

  // Score row values
  var tokefScore = ts.days!==null ? (ts.days<0?'פג':ts.days+'י׳') : '—';
  var tokefCls = ts.cls==='tokef-ok'?'green':ts.cls==='tokef-expired'?'red':'orange';
  var ageScore = age ? (age.years>0?age.years+'שנ׳':age.months+'חו׳') : '—';
  var estimatedKm = '—';
  if(mil.avgKm&&age) estimatedKm = '~'+(mil.avgKm*age.years/1000).toFixed(0)+'K';

  var shareWa = 'https://wa.me/?text='+encodeURIComponent('בדיקת רכב: '+fs(c.tozeret_nm)+' '+fs(c.kinuy_mishari)+' ('+fs(c.shnat_yitzur)+') · לוחית '+plate+'\n'+window.location.origin+window.location.pathname+'?plate='+plate);

  return '<div class="report-card">'+
    '<div class="car-header">'+
      '<div>'+makePlate(plate)+
        '<div class="car-name">'+fs(c.tozeret_nm)+' '+fs(c.kinuy_mishari)+'</div>'+
        '<div class="car-sub">'+fs(c.shnat_yitzur)+' · '+fs(c.tzeva_rechev)+' · '+fs(c.sug_delek_nm)+(fv(c.mivne_mechonit_nm)?' · '+c.mivne_mechonit_nm:'')+'</div>'+
      '</div>'+
      '<div class="tokef-badge '+ts.cls+'">'+
        '<div style="font-size:10px;opacity:.7;margin-bottom:3px;">תוקף טסט</div>'+
        '<div style="font-size:15px;">'+formatDate(c.tokef_dt)+'</div>'+
        '<div style="font-size:12px;margin-top:4px;">'+ts.text+'</div>'+
      '</div>'+
    '</div>'+

    '<div class="score-row">'+
      scoreCard('🔧', tokefScore, ts.days!==null?(ts.days<0?'פג תוקף':'ימים לטסט'):'תוקף', tokefCls)+
      scoreCard('📅', age?String(age.years)+'שנ׳':'—', 'גיל על הכביש', 'gold')+
      scoreCard('👥', String(owners), owners===1?'בעלים ראשוני':'בעלים', owners<=2?'green':'orange')+
      scoreCard('🛡️', fv(c.ramat_eivzur_betihuty)?(c.ramat_eivzur_betihuty+'/7'):'—', 'רמת בטיחות', parseInt(c.ramat_eivzur_betihuty)>=5?'green':'gold')+
    '</div>'+

    '<div class="info-grid">'+

    (function(){
      var shown = new Set(['baalut','mispar_baalim','ramat_eivzur_betihuty']);

      /* פרטי הרכב */
      var basicCards = buildFieldCards(c, BASIC_FIELDS, shown, function(k,v){
        return k==='shnat_yitzur'?'gold':'';
      });
      var basicSection = basicCards ? '<div class="sec-div">🚗 פרטי הרכב</div>'+basicCards : '';

      /* מפרט טכני — dynamic, show only fields that have values */
      var techCards = buildFieldCards(c, TECH_FIELDS, shown, null);
      var techSection = techCards ? '<div class="sec-div">⚙️ מפרט טכני</div>'+techCards : '';

      /* WLTP */
      var wltpSection = wltp || '';

      /* רישוי */
      var licCards =
        card('תאריך עלייה לכביש', formatDate(c.moed_aliya_lakvish))+
        card('וותק על הכביש', age?age.str:'—')+
        (fv(c.mivchan_acharon_dt)?card('מבחן טכני אחרון', formatDate(c.mivchan_acharon_dt)):'')+
        card('תוקף רישיון', formatDate(c.tokef_dt), ts.cls==='tokef-expired'?'red':ts.cls==='tokef-ok'?'green':'gold')+
        (baalutTxt!=='—'?card('סוג בעלות', baalutTxt):'');
      shown.add('moed_aliya_lakvish'); shown.add('mivchan_acharon_dt'); shown.add('tokef_dt'); shown.add('kvutzat_zihum'); shown.add('kvutzat_agra');
      buildFieldCards(c, LICENSE_FIELDS, shown, function(k){ return k==='kvutzat_zihum'?'green':''; });
      licCards += (fv(c.kvutzat_zihum)?card('קבוצת זיהום', fs(c.kvutzat_zihum),'green'):'')+
                  (fv(c.kvutzat_agra)?card('קבוצת אגרה', fs(c.kvutzat_agra)):'');

      /* כל שאר הנתונים מה-API שלא הוצגו */
      var extraCards = buildCatchAll(c, shown);
      var extraSection = extraCards ? '<div class="sec-div">📋 נתונים נוספים מהמאגר</div>'+extraCards : '';

      return basicSection + techSection + wltpSection +
        '<div class="sec-div">📋 רישוי ומבחנים</div>'+licCards +
        extraSection;
    })()+

    /* תובנות */
    insights+

    /* קילומטרז' */
    (mil.html||'')+

    /* בעלות */
    '<div class="sec-div">👥 היסטוריית בעלות <small>'+owners+' בעלים · הנוכחי = זהב</small></div>'+
    '<div class="owners-bar"><div class="owners-label">רצף בעלים לפי סדר</div><div class="owners-dots">'+ownersHtml(c.mispar_baalim)+'</div></div>'+

    /* ריקולים */
    recalls+

    /* בטיחות */
    (safety?'<div class="sec-div">🛡️ ציוד בטיחות</div>'+safety:'')+

    '<div class="source-note">נתונים: מאגר משרד התחבורה — data.gov.il · WLTP · ריקולים</div>'+
    '</div>'+
    '</div>'+

    '<div class="share-bar">'+
      '<a class="share-btn wa" href="'+shareWa+'" target="_blank">📲 שתף בWhatsApp</a>'+
      '<button class="share-btn link" onclick="copyLink()">🔗 העתק קישור</button>'+
    '</div>';
}

/* ── Lookup ── */
function lookupPlate(){
  var plate=document.getElementById('plateInput').value.trim().replace(/[-\s]/g,'');
  if(!plate||plate.length<5){alert('הכנס מספר רישוי תקין');return;}

  var result=document.getElementById('result');
  result.innerHTML='<div class="loading">⏳ שולף נתונים ממשרד התחבורה...<div class="loading-sub">מאגר רכבים · WLTP · ריקולים</div></div>';

  var enc=encodeURIComponent(JSON.stringify({'mispar_rechev':plate}));
  var vehicleUrl='https://data.gov.il/api/3/action/datastore_search?resource_id=053cea08-09bc-40ec-8f7a-156f0677aff3&filters='+enc+'&limit=1';
  var testsUrl='https://data.gov.il/api/3/action/datastore_search?resource_id=bf9df4e2-d90d-4c0a-a400-19e15af8e95f&filters='+enc+'&limit=30';

  fetch(vehicleUrl)
    .then(function(r){return r.json();})
    .then(function(vehicleData){
      if(!vehicleData.success||!vehicleData.result.records||!vehicleData.result.records.length){
        result.innerHTML='<div class="empty"><span class="empty-icon">❌</span>לא נמצא רכב עם מספר רישוי זה</div>';
        return;
      }
      var c=vehicleData.result.records[0];
      var wltpEnc=encodeURIComponent(JSON.stringify({'degem_cd':c.degem_cd}));
      var wltpUrl='https://data.gov.il/api/3/action/datastore_search?resource_id=5e87a7a1-2f6f-41c1-8aec-7216d52a6cf6&filters='+wltpEnc+'&limit=1';

      /* Recall: discover resource ID dynamically */
      var recallPromise=fetch('https://data.gov.il/api/3/action/package_show?id=recall')
        .then(function(r){return r.json();})
        .then(function(pkg){
          var resources=pkg.result&&pkg.result.resources;
          if(!resources||!resources.length)return null;
          var res=(resources.find(function(r){return r.datastore_active;})||resources[0]);
          var tozEnc=encodeURIComponent(JSON.stringify({'tozeret_nm':c.tozeret_nm}));
          return fetch('https://data.gov.il/api/3/action/datastore_search?resource_id='+res.id+'&filters='+tozEnc+'&limit=10').then(function(r){return r.json();});
        }).catch(function(){return null;});

      Promise.all([
        fetch(testsUrl).then(function(r){return r.json();}).catch(function(){return null;}),
        fetch(wltpUrl).then(function(r){return r.json();}).catch(function(){return null;}),
        recallPromise
      ]).then(function(extras){
        var testsData=extras[0],wltpResp=extras[1],recallData=extras[2];
        var testRecs=(testsData&&testsData.success&&testsData.result&&testsData.result.records)||[];
        var wltpRec=(wltpResp&&wltpResp.success&&wltpResp.result&&wltpResp.result.records&&wltpResp.result.records.length)?wltpResp.result.records[0]:null;
        var recallRecs=(recallData&&recallData.success&&recallData.result&&recallData.result.records)||null;
        result.innerHTML=renderResult(c,testRecs,wltpRec,recallRecs);
      });
    })
    .catch(function(){
      result.innerHTML='<div class="empty"><span class="empty-icon">⚠️</span>שגיאה בחיבור למאגר. נסה שוב.</div>';
    });
}
