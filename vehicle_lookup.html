<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בדיקת רכב לפי לוחית רישוי — ענק הרכבים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#f0f2f8;color:#1a1a2e;min-height:100vh}
.header{background:#1a1a2e;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-size:20px;font-weight:900;color:#fff;text-decoration:none}.logo span{color:#c9a227}
.back-btn{background:#c9a227;color:#000;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;font-family:'Heebo',sans-serif;cursor:pointer;text-decoration:none}
.body{padding:24px;max-width:720px;margin:0 auto;padding-bottom:60px}

/* Search */
.search-box{background:#fff;border-radius:16px;padding:24px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.search-title{font-size:18px;font-weight:900;margin-bottom:16px}
.search-row{display:flex;gap:10px}
.plate-input{flex:1;padding:16px 20px;border:2px solid #e0e4ef;border-radius:12px;font-size:24px;font-weight:900;font-family:'Heebo',sans-serif;color:#1a1a2e;text-align:center;letter-spacing:4px;outline:none;direction:ltr;background:#f9faff;}
.plate-input:focus{border-color:#c9a227;background:#fff}
.plate-input::placeholder{font-size:14px;font-weight:400;letter-spacing:0;color:#bbb}
.search-btn{background:#c9a227;color:#000;border:none;border-radius:12px;padding:16px 28px;font-size:16px;font-weight:900;font-family:'Heebo',sans-serif;cursor:pointer;white-space:nowrap}
.search-btn:hover{opacity:.88}

/* Plate */
.plate-visual{display:inline-flex;align-items:center;background:#fff;border:3px solid #1a1a2e;border-radius:10px;overflow:hidden;font-family:'Heebo',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.15);margin-bottom:8px;}
.plate-blue{background:#003399;color:#fff;padding:6px 8px;font-size:11px;font-weight:900;writing-mode:vertical-rl;text-align:center;letter-spacing:1px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:28px;}
.plate-flag{font-size:14px;}.plate-il{font-size:9px;letter-spacing:0;}
.plate-number{padding:8px 18px;font-size:28px;font-weight:900;letter-spacing:4px;color:#1a1a2e;direction:ltr;min-width:160px;text-align:center;}

/* Header */
.car-header{background:#1a1a2e;border-radius:16px 16px 0 0;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.car-name{color:#fff;font-size:20px;font-weight:900;margin-bottom:2px;}
.car-sub{color:#aaa;font-size:13px;}

/* Tokef badge */
.tokef-badge{padding:10px 16px;border-radius:10px;font-size:14px;font-weight:900;text-align:center;min-width:130px;}
.tokef-ok{background:#dcfce7;color:#065f46;}
.tokef-warn{background:#fef3c7;color:#92400e;}
.tokef-expired{background:#fee2e2;color:#991b1b;}

/* Pills */
.summary-pills{display:flex;gap:7px;flex-wrap:wrap;padding:14px 18px;background:#f9faff;border-bottom:1px solid #f0f2fa;}
.pill{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid #e0e4ef;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:#1a1a2e;}
.pill.green{background:#dcfce7;border-color:#bbf7d0;color:#065f46;}
.pill.red{background:#fee2e2;border-color:#fecaca;color:#991b1b;}
.pill.gold{background:#fef9ec;border-color:#f5e09a;color:#92400e;}
.pill.blue{background:#eff6ff;border-color:#bfdbfe;color:#1e40af;}

/* Grid */
.report-card{border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;background:#fff;}
.info-card{padding:16px 18px;border-bottom:1px solid #f0f2fa;border-left:1px solid #f0f2fa;display:flex;flex-direction:column;gap:3px;}
.info-card:nth-child(even){border-left:none;}
.info-card.full{grid-column:1/-1;border-left:none;}
.info-label{font-size:10px;color:#7a839a;font-weight:700;letter-spacing:.05em;}
.info-val{font-size:16px;font-weight:800;color:#1a1a2e;}
.info-val.green{color:#065f46;}
.info-val.red{color:#dc2626;}
.info-val.gold{color:#c9a227;}
.info-val.sm{font-size:13px;line-height:1.35;}

/* Section divider */
.section-divider{background:#f9faff;padding:11px 18px;font-size:12px;font-weight:900;color:#1a1a2e;border-bottom:1px solid #f0f2fa;border-top:1px solid #f0f2fa;grid-column:1/-1;display:flex;align-items:center;gap:7px;}
.section-divider small{font-weight:400;color:#7a839a;font-size:11px;margin-right:auto;}

/* Owners */
.owners-bar{grid-column:1/-1;padding:16px 18px;border-bottom:1px solid #f0f2fa;background:#fff;}
.owners-label{font-size:10px;color:#7a839a;font-weight:700;margin-bottom:10px;}
.owners-dots{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.owner-dot{width:36px;height:36px;border-radius:50%;background:#e0e4ef;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#1a1a2e;}
.owner-dot.current{background:#c9a227;color:#000;box-shadow:0 0 0 3px #fef3c7;}

/* Mileage timeline */
.km-section{grid-column:1/-1;padding:16px 18px;border-bottom:1px solid #f0f2fa;background:#fff;}
.km-label{font-size:10px;color:#7a839a;font-weight:700;margin-bottom:14px;}
.km-list{position:relative;padding-right:22px;}
.km-list::before{content:'';position:absolute;right:4px;top:8px;width:2px;bottom:8px;background:#e0e4ef;}
.km-entry{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;position:relative;}
.km-entry:last-child{margin-bottom:0;}
.km-dot{width:8px;height:8px;border-radius:50%;background:#c9a227;flex-shrink:0;margin-top:6px;position:absolute;right:-22px;}
.km-dot.latest{width:10px;height:10px;background:#1a1a2e;margin-top:5px;right:-23px;}
.km-date{font-size:11px;color:#7a839a;font-weight:600;margin-bottom:1px;}
.km-val{font-size:16px;font-weight:900;color:#1a1a2e;}
.km-delta{font-size:11px;color:#7a839a;margin-top:2px;}
.km-avg-box{margin-top:12px;padding:10px 14px;background:#f9faff;border-radius:10px;display:flex;gap:24px;flex-wrap:wrap;}
.km-avg-item strong{display:block;font-size:16px;font-weight:900;color:#1a1a2e;}
.km-avg-item{font-size:12px;color:#7a839a;font-weight:600;}

/* Safety */
.safety-section{grid-column:1/-1;padding:16px 18px;border-bottom:1px solid #f0f2fa;background:#fff;}
.safety-label{font-size:10px;color:#7a839a;font-weight:700;margin-bottom:10px;}
.safety-squares{display:flex;gap:4px;margin-bottom:6px;}
.safety-sq{width:22px;height:22px;border-radius:5px;background:#e0e4ef;}
.safety-sq.fill{background:#c9a227;}
.safety-score-row{display:flex;align-items:center;gap:10px;}
.safety-score-txt{font-size:22px;font-weight:900;color:#1a1a2e;}
.safety-score-sub{font-size:12px;color:#7a839a;}

/* WLTP fuel row */
.fuel-row{grid-column:1/-1;padding:14px 18px;border-bottom:1px solid #f0f2fa;background:#fff;display:flex;gap:20px;flex-wrap:wrap;}
.fuel-item{display:flex;flex-direction:column;gap:2px;}
.fuel-item .info-label{font-size:10px;}
.fuel-item .info-val{font-size:15px;}

/* Source note */
.source-note{grid-column:1/-1;padding:10px 18px;font-size:11px;color:#bbb;background:#fafbff;border-top:1px solid #f0f2fa;}

.empty{text-align:center;padding:48px 20px;color:#aaa;background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);}
.empty-icon{font-size:48px;display:block;margin-bottom:12px;}
.loading{text-align:center;padding:40px;color:#7a839a;font-size:15px;background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);}

@media(max-width:500px){
  .search-row{flex-direction:column;}
  .body{padding:16px;}
  .info-grid{grid-template-columns:1fr;}
  .info-card{border-left:none;}
  .car-header{flex-direction:column;align-items:flex-start;}
  .plate-number{font-size:22px;}
  .km-avg-box{gap:14px;}
  .fuel-row{gap:14px;}
}
</style>
</head>
<body>
<div class="header">
  <a class="logo" href="/">ענק <span>הרכבים</span></a>
  <a class="back-btn" href="/">← חזור למלאי</a>
</div>

<div class="body">
  <div class="search-box">
    <div class="search-title">🔍 בדיקת רכב לפי לוחית רישוי</div>
    <div class="search-row">
      <input class="plate-input" type="tel" id="plateInput" placeholder="הכנס מספר רישוי..." maxlength="8" inputmode="numeric">
      <button class="search-btn" onclick="lookupPlate()">חפש</button>
    </div>
  </div>
  <div id="result">
    <div class="empty"><span class="empty-icon">🚗</span>הכנס מספר רישוי לקבלת פרטי הרכב ממשרד התחבורה</div>
  </div>
</div>

<script>
document.getElementById('plateInput').addEventListener('keydown', function(e){ if(e.key==='Enter') lookupPlate(); });

var urlParams = new URLSearchParams(window.location.search);
var plateParm = urlParams.get('plate');
if(plateParm){ document.getElementById('plateInput').value = plateParm; window.addEventListener('load', lookupPlate); }

var HE_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function f(v){ return (v !== undefined && v !== null && v !== '' && v !== 'None' && String(v).trim() !== '') ? v : null; }
function fStr(v){ var r = f(v); return r !== null ? String(r) : '—'; }

function formatDate(s){
  if(!s || s==='None') return '—';
  var d = new Date(s); if(isNaN(d)) return s;
  return d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function monthYear(d){ return HE_MONTHS[d.getMonth()]+' '+d.getFullYear(); }

function tokefStatus(s){
  if(!s || s==='None') return {cls:'', text:'לא ידוע'};
  var d = new Date(s), now = new Date();
  var diff = (d-now)/(1000*60*60*24);
  if(diff < 0)  return {cls:'tokef-expired', text:'פג תוקף ❌'};
  if(diff < 60) return {cls:'tokef-warn',    text:'פג בקרוב ⚠️'};
  return {cls:'tokef-ok', text:'בתוקף ✓'};
}
function daysUntil(s){
  if(!s || s==='None') return null;
  var d = new Date(s), now = new Date();
  return Math.round((d-now)/(1000*60*60*24));
}

function vehicleAge(s){
  if(!s || s==='None') return '—';
  var d = new Date(s); if(isNaN(d)) return '—';
  var now = new Date();
  var y = now.getFullYear()-d.getFullYear(), m = now.getMonth()-d.getMonth();
  if(m<0){y--;m+=12;}
  return y===0 ? m+' חודשים' : y+(m>0?' שנים ו-'+m+' חודשים':' שנים');
}

function baalutLabel(v){
  var map={'1':'פרטי','2':'עסקי','3':'ממשלתי','4':'ליסינג','5':'השכרה'};
  return map[String(v)] || fStr(v);
}

function ownersHtml(n){
  var num = parseInt(n)||1, h='';
  for(var i=1;i<=Math.min(num,8);i++) h+='<div class="owner-dot'+(i===num?' current':'')+'">'+( i===1?'👤':i)+'</div>';
  if(num>8) h+='<div style="color:#7a839a;font-size:13px;font-weight:700;">+'+(num-8)+'</div>';
  return h;
}

function makePlate(plate){
  var fmt = plate.length===7 ? plate.slice(0,3)+'-'+plate.slice(3,5)+'-'+plate.slice(5) : plate.slice(0,2)+'-'+plate.slice(2,5)+'-'+plate.slice(5);
  return '<div class="plate-visual"><div class="plate-blue"><span class="plate-flag">🇮🇱</span><span class="plate-il">IL</span></div><div class="plate-number">'+fmt+'</div></div>';
}

function safetyHtml(level){
  var lv = parseInt(level);
  if(isNaN(lv)) return '';
  var max=7, filled=Math.min(lv,max), sqs='';
  for(var i=0;i<max;i++) sqs+='<div class="safety-sq'+(i<filled?' fill':'')+'"></div>';
  return '<div class="safety-section">'+
    '<div class="safety-label">רמת ציוד בטיחות (משרד התחבורה)</div>'+
    '<div class="safety-squares">'+sqs+'</div>'+
    '<div class="safety-score-row"><div class="safety-score-txt">'+filled+' / '+max+'</div><div class="safety-score-sub">לפי דירוג משרד התחבורה</div></div>'+
  '</div>';
}

function renderMileageTimeline(records){
  if(!records || !records.length) return '';
  var sample = records[0];
  var kmField = ['km_counter','km','merhak_rishum','odometer','merhak','odo'].find(function(k){ return f(sample[k]) !== null; });
  var dateField = ['moed_haavara','taarich_tokef','test_date','rishui_dt','taarich'].find(function(k){ return f(sample[k]) !== null; });
  var hasYearMonth = !dateField && f(sample.shnat_tokef);
  if(!kmField) return '';

  var entries = records.map(function(r){
    var km = parseInt(r[kmField])||0;
    var date = null;
    if(dateField && r[dateField]) date = new Date(r[dateField]);
    else if(hasYearMonth && r.shnat_tokef){
      var m = r.chodesh_tokef||'01';
      date = new Date(r.shnat_tokef+'-'+String(m).padStart(2,'0')+'-01');
    }
    if(!date || isNaN(date) || km < 100) return null;
    return {km:km, date:date};
  }).filter(Boolean).sort(function(a,b){ return a.date-b.date; });

  if(!entries.length) return '';

  var list = entries.map(function(e,i){
    var isLatest = (i===entries.length-1);
    var prev = i>0 ? entries[i-1] : null;
    var delta = '';
    if(prev){
      var dkm = e.km-prev.km, dy = (e.date-prev.date)/(1000*60*60*24*365);
      if(dkm>0 && dy>0) delta = '<div class="km-delta">+'+dkm.toLocaleString('he-IL')+' ק"מ · '+Math.round(dkm/dy).toLocaleString('he-IL')+' ק"מ/שנה</div>';
    }
    return '<div class="km-entry"><div class="km-dot'+(isLatest?' latest':'')+'"></div><div><div class="km-date">'+monthYear(e.date)+' — טסט רכב</div><div class="km-val">'+e.km.toLocaleString('he-IL')+' ק"מ</div>'+delta+'</div></div>';
  }).join('');

  var avgBox = '';
  if(entries.length>=2){
    var first=entries[0], last=entries[entries.length-1];
    var totalY = (last.date-first.date)/(1000*60*60*24*365);
    if(totalY>0.5){
      var avgKm = Math.round((last.km-first.km)/totalY);
      var projected = last.km + Math.round(avgKm*((new Date()-last.date)/(1000*60*60*24*365)));
      avgBox = '<div class="km-avg-box">'+
        '<div class="km-avg-item"><strong>'+avgKm.toLocaleString('he-IL')+' ק"מ</strong>ממוצע שנתי</div>'+
        '<div class="km-avg-item"><strong>'+last.km.toLocaleString('he-IL')+' ק"מ</strong>בטסט האחרון</div>'+
        '<div class="km-avg-item"><strong>~'+projected.toLocaleString('he-IL')+' ק"מ</strong>הערכה להיום</div>'+
      '</div>';
    }
  }
  return '<div class="km-section"><div class="km-label">היסטוריית קילומטרז\' לפי טסטים</div><div class="km-list">'+list+'</div>'+avgBox+'</div>';
}

function renderWltp(wData){
  if(!wData) return '';
  var items = [];
  var fields = [
    ['tzrichat_delek_ironi','צריכה עירונית','ליטר/100ק"מ'],
    ['tzrichat_delek_kvish','צריכה בינעירונית','ליטר/100ק"מ'],
    ['tzrichat_delek_mishuv','צריכה משולבת','ליטר/100ק"מ'],
    ['plitatCO2','פליטות CO2','גר/ק"מ'],
    ['tevin_nesia_chashmal','טווח נסיעה חשמלי','ק"מ'],
    ['tzrichat_chashmal_mishuv','צריכת חשמל','kWh/100ק"מ'],
  ];
  fields.forEach(function(fd){
    var v = f(wData[fd[0]]);
    if(v !== null) items.push('<div class="fuel-item"><div class="info-label">'+fd[1]+'</div><div class="info-val">'+v+' <span style="font-size:11px;font-weight:400;color:#7a839a;">'+fd[2]+'</span></div></div>');
  });
  if(!items.length) return '';
  return '<div class="fuel-row">'+items.join('')+'</div>';
}

function card(label, val, cls){ return '<div class="info-card"><div class="info-label">'+label+'</div><div class="info-val'+(cls?' '+cls:'')+'">'+(val||'—')+'</div></div>'; }
function cardSm(label, val){ return val ? '<div class="info-card"><div class="info-label">'+label+'</div><div class="info-val sm">'+val+'</div></div>' : ''; }

function renderResult(c, testsRecords, wltpData){
  var plate = document.getElementById('plateInput').value.trim().replace(/[-\s]/g,'');
  var ts = tokefStatus(c.tokef_dt);
  var age = vehicleAge(c.moed_aliya_lakvish);
  var owners = parseInt(c.mispar_baalim)||1;
  var baalutTxt = baalutLabel(c.baalut);
  var days = daysUntil(c.tokef_dt);

  /* Pills */
  var pills =
    '<div class="pill '+(ts.cls==='tokef-ok'?'green':ts.cls==='tokef-expired'?'red':'gold')+'">🔧 '+ts.text+'</div>'+
    '<div class="pill">📅 '+fStr(c.shnat_yitzur)+'</div>'+
    '<div class="pill">👥 '+owners+' בעלים</div>'+
    (baalutTxt!=='—'?'<div class="pill">🏷️ '+baalutTxt+'</div>':'')+
    (age!=='—'?'<div class="pill">⏱️ '+age+'</div>':'')+
    (f(c.kvutzat_zihum)?'<div class="pill green">🌿 זיהום '+c.kvutzat_zihum+'</div>':'')+
    (days!==null && days>=0 && days<=30?'<div class="pill red">⚠️ פג עוד '+days+' ימים</div>':'')+
    (f(c.hanaa_nm)?'<div class="pill blue">⚙️ '+c.hanaa_nm+'</div>':'')+
    (f(c.mivne_mechonit_nm)?'<div class="pill blue">🚘 '+c.mivne_mechonit_nm+'</div>':'');

  var mileage = renderMileageTimeline(testsRecords);
  var safety = safetyHtml(c.ramat_eivzur_betihuty);
  var wltp = renderWltp(wltpData);

  return '<div class="report-card">'+
    /* Car header */
    '<div class="car-header">'+
      '<div>'+makePlate(plate)+
        '<div class="car-name">'+fStr(c.tozeret_nm)+' '+fStr(c.kinuy_mishari)+'</div>'+
        '<div class="car-sub">'+fStr(c.shnat_yitzur)+' · '+fStr(c.tzeva_rechev)+' · '+fStr(c.sug_delek_nm)+'</div>'+
      '</div>'+
      '<div class="tokef-badge '+ts.cls+'">'+
        '<div style="font-size:10px;opacity:.8;margin-bottom:3px;">תוקף טסט</div>'+
        '<div style="font-size:15px;">'+formatDate(c.tokef_dt)+'</div>'+
        '<div style="font-size:12px;margin-top:4px;">'+ts.text+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="summary-pills">'+pills+'</div>'+
    '<div class="info-grid">'+

    /* פרטי הרכב */
    '<div class="section-divider">🚗 פרטי הרכב</div>'+
    card('יצרן', fStr(c.tozeret_nm))+
    card('דגם מסחרי', fStr(c.kinuy_mishari))+
    card('שנת ייצור', fStr(c.shnat_yitzur), 'gold')+
    card('ארץ ייצור', fStr(c.eretz_yitzur_nm))+
    card('צבע', fStr(c.tzeva_rechev))+
    card('סוג דלק', fStr(c.sug_delek_nm))+
    cardSm('סוג רכב', fStr(c.sug_rechev_nm))+
    cardSm('מבנה', fStr(c.mivne_mechonit_nm))+
    cardSm('רמת גימור', fStr(c.ramat_gimur))+
    cardSm('שם דגם', fStr(c.degem_nm))+

    /* מפרט טכני */
    '<div class="section-divider">⚙️ מפרט טכני</div>'+
    card('נפח מנוע (סמ"ק)', fStr(c.nefach_manoa))+
    card('הספק (כ"ס)', fStr(c.kosher_neto))+
    card('הנעה', fStr(c.hanaa_nm))+
    card('טכנולוגיית מנוע', fStr(c.technologiat_rig))+
    card('משקל עצמי (ק"ג)', fStr(c.mishkal_ezem))+
    card('משקל כולל (ק"ג)', fStr(c.mishkal_kolel))+
    card('מספר מושבים', fStr(c.mispar_moshavim))+
    (f(c.mispar_dlatot) ? card('מספר דלתות', fStr(c.mispar_dlatot)) : '')+
    cardSm('קוד מנוע', fStr(c.degem_manoa))+

    /* צריכת דלק WLTP */
    (wltp ? '<div class="section-divider">⛽ צריכת דלק / פליטות WLTP</div>'+wltp : '')+

    /* רישוי */
    '<div class="section-divider">📋 רישוי ומבחנים</div>'+
    card('תאריך עלייה לכביש', formatDate(c.moed_aliya_lakvish))+
    card('וותק על הכביש', age)+
    (f(c.mivchan_acharon_dt) ? card('מבחן טכני אחרון', formatDate(c.mivchan_acharon_dt)) : '')+
    card('תוקף רישיון', formatDate(c.tokef_dt), ts.cls==='tokef-expired'?'red':ts.cls==='tokef-ok'?'green':'gold')+
    (baalutTxt!=='—' ? card('סוג בעלות', baalutTxt) : '')+
    (f(c.kvutzat_zihum) ? card('קבוצת זיהום', fStr(c.kvutzat_zihum), 'green') : '')+
    (f(c.kvutzat_agra) ? card('קבוצת אגרה', fStr(c.kvutzat_agra)) : '')+

    /* קילומטרז' */
    (mileage || '')+

    /* בעלות */
    '<div class="section-divider">👥 היסטוריית בעלות <small>'+owners+' בעלים · הנוכחי = זהב</small></div>'+
    '<div class="owners-bar">'+
      '<div class="owners-label">רצף בעלים לפי סדר</div>'+
      '<div class="owners-dots">'+ownersHtml(c.mispar_baalim)+'</div>'+
    '</div>'+

    /* בטיחות */
    (safety ? '<div class="section-divider">🛡️ ציוד בטיחות</div>'+safety : '')+

    '<div class="source-note">נתונים: מאגר משרד התחבורה — data.gov.il</div>'+
    '</div>'+
  '</div>';
}

function lookupPlate(){
  var plate = document.getElementById('plateInput').value.trim().replace(/[-\s]/g,'');
  if(!plate || plate.length<5){ alert('הכנס מספר רישוי תקין'); return; }

  var result = document.getElementById('result');
  result.innerHTML = '<div class="loading">⏳ שולף נתונים ממשרד התחבורה...</div>';

  var enc = encodeURIComponent(JSON.stringify({'mispar_rechev': plate}));
  var vehicleUrl = 'https://data.gov.il/api/3/action/datastore_search?resource_id=053cea08-09bc-40ec-8f7a-156f0677aff3&filters='+enc+'&limit=1';
  var testsUrl   = 'https://data.gov.il/api/3/action/datastore_search?resource_id=bf9df4e2-d90d-4c0a-a400-19e15af8e95f&filters='+enc+'&limit=30';

  fetch(vehicleUrl)
    .then(function(r){ return r.json(); })
    .then(function(vehicleData){
      if(!vehicleData.success || !vehicleData.result.records || !vehicleData.result.records.length){
        result.innerHTML = '<div class="empty"><span class="empty-icon">❌</span>לא נמצא רכב עם מספר רישוי זה</div>';
        return;
      }
      var c = vehicleData.result.records[0];

      /* fetch tests + wltp in parallel */
      var wltpEnc = encodeURIComponent(JSON.stringify({'degem_cd': c.degem_cd, 'tozeret_cd': c.tozeret_cd}));
      var wltpUrl = 'https://data.gov.il/api/3/action/datastore_search?resource_id=5e87a7a1-2f6f-41c1-8aec-7216d52a6cf6&filters='+wltpEnc+'&limit=1';

      Promise.all([
        fetch(testsUrl).then(function(r){ return r.json(); }).catch(function(){ return null; }),
        fetch(wltpUrl).then(function(r){ return r.json(); }).catch(function(){ return null; })
      ]).then(function(extras){
        var testsData = extras[0], wltpResp = extras[1];
        var testRecords = (testsData && testsData.success && testsData.result && testsData.result.records) ? testsData.result.records : [];
        var wltpRecord = (wltpResp && wltpResp.success && wltpResp.result && wltpResp.result.records && wltpResp.result.records.length) ? wltpResp.result.records[0] : null;
        result.innerHTML = renderResult(c, testRecords, wltpRecord);
      });
    })
    .catch(function(){
      result.innerHTML = '<div class="empty"><span class="empty-icon">⚠️</span>שגיאה בחיבור למאגר. נסה שוב.</div>';
    });
}
