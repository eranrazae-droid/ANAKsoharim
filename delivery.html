<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ממתין למסירה — ענק הרכבים</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1f3c">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#f0f4fa;color:#0d1f3c;min-height:100vh;display:flex;flex-direction:column}

.hdr{background:#0d1f3c;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-size:16px;font-weight:900;color:#fff}
.hdr-logo span{color:#c9a227}
.hdr-sub{font-size:12px;color:#7a9ccf;margin-top:2px}

.page{max-width:680px;margin:0 auto;padding:30px 16px 100px;width:100%}

.icon{font-size:56px;text-align:center;margin-bottom:20px}

.main-title{font-size:20px;font-weight:900;color:#0d1f3c;line-height:1.6;margin-bottom:10px;text-align:center}
.main-title .company{color:#1a56db}
.main-title .plate{color:#c9a227;background:#fff8dc;border-radius:8px;padding:2px 10px;display:inline-block}
.main-title .amount{color:#16a34a}
.main-title .customer{color:#0ea5e9}

.sub-line{font-size:16px;font-weight:700;color:#5a7aa5;padding:14px 20px;background:#fff;border-radius:12px;border:1px solid #dce6f5;box-shadow:0 2px 8px rgba(13,31,60,.06);text-align:center;margin-bottom:20px}

/* checklist */
.check-item{background:#fff;border:2px solid #dce6f5;border-radius:14px;display:flex;align-items:center;gap:14px;padding:18px;cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:10px}
.check-item:hover{border-color:#0ea5e9}
.check-item.done{background:#f0fdf4;border-color:#16a34a}
.check-item.missing{border-color:#e02d2d;background:#fff0f0;animation:shake .3s}
.check-box{width:32px;height:32px;border:2.5px solid #dce6f5;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:all .15s;background:#f5f8ff}
.check-item.done .check-box{background:#16a34a;border-color:#16a34a;color:#fff}
.check-label{font-size:16px;font-weight:700;color:#0d1f3c}
.check-item.done .check-label{color:#166534}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

/* bottom fixed btn */
.complete-btn{position:fixed;bottom:0;right:0;left:0;padding:16px 20px;background:#fff;border-top:1px solid #dce6f5}
.complete-btn button{width:100%;max-width:640px;display:block;margin:0 auto;background:#16a34a;color:#fff;border:none;border-radius:14px;padding:18px;font-family:'Heebo',sans-serif;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(22,163,74,.3)}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">ענק <span>הרכבים</span></div>
    <div class="hdr-sub">ממתין למסירה</div>
  </div>
  <div style="display:flex;gap:8px">
    <a href="quotes.html" style="color:#7a9ccf;font-size:13px;font-weight:700;text-decoration:none;background:#1a2f54;padding:8px 14px;border-radius:8px">← מימונים</a>
    <a href="index.html" style="color:#7a9ccf;font-size:13px;font-weight:700;text-decoration:none;background:#1a2f54;padding:8px 14px;border-radius:8px">→ דף הבית</a>
  </div>
</div>

<div class="page">
  <div class="icon">🚗</div>
  <div class="main-title" id="main-msg">טוען...</div>

  <div class="sub-line">לאחר המסירה ניתן לעשות העברת בעלות</div>

  <!-- צ'ק ליסט -->
  <div id="ci-0" class="check-item" onclick="toggle(0)">
    <div class="check-box" id="cb-0"></div>
    <div class="check-label">בוצע בעלות</div>
  </div>
  <div id="ci-1" class="check-item" onclick="toggle(1)">
    <div class="check-box" id="cb-1"></div>
    <div class="check-label">נשלחה מסירה חתומה לחברת המימון</div>
  </div>
</div>

<div class="complete-btn">
  <button onclick="finish()">מברוק !! סיימנו את העסקה 💯</button>
</div>

<script>
var checks = [false, false];
var dealIdx = 0;

function fmt(n){ return '₪ ' + Math.round(n||0).toLocaleString('he-IL'); }

var _deal = null;

function getDealIdx() {
  if (!_deal || !_deal.id) return dealIdx;
  var deals = JSON.parse(localStorage.getItem('anak-deals') || '[]');
  var idx = deals.findIndex(function(d){ return d.id === _deal.id; });
  return idx >= 0 ? idx : dealIdx;
}

function toggle(i) {
  checks[i] = !checks[i];
  render();
  var deals = JSON.parse(localStorage.getItem('anak-deals') || '[]');
  var idx = getDealIdx();
  if (deals[idx]) {
    deals[idx].deliveryChecks = checks;
    localStorage.setItem('anak-deals', JSON.stringify(deals));
    _deal = deals[idx];
  }
}

function render() {
  for (var i = 0; i < 2; i++) {
    var ci = document.getElementById('ci-' + i);
    var cb = document.getElementById('cb-' + i);
    if (checks[i]) { ci.className = 'check-item done'; cb.textContent = '✓'; }
    else           { ci.className = 'check-item';      cb.textContent = '';  }
  }
}

function finish() {
  var missing = [];
  for (var i = 0; i < 2; i++) { if (!checks[i]) missing.push(i); }
  if (missing.length > 0) {
    missing.forEach(function(i) {
      var ci = document.getElementById('ci-' + i);
      ci.className = 'check-item missing';
      setTimeout(function(idx){ return function(){ document.getElementById('ci-'+idx).className = checks[idx] ? 'check-item done' : 'check-item'; }; }(i), 1200);
    });
    var firstCi = document.getElementById('ci-' + missing[0]);
    firstCi.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  // עדכן סטטוס סופי
  var deals = JSON.parse(localStorage.getItem('anak-deals') || '[]');
  var idx = getDealIdx();
  if (deals[idx]) {
    deals[idx].dealStatus = 'הושלם';
    deals[idx].statusChangedAt = Date.now();
    deals[idx].completedAt = deals[idx].completedAt || Date.now();
    localStorage.setItem('anak-deals', JSON.stringify(deals));
  }
  location.href = 'quotes.html';
}

(function init(){
  var params = new URLSearchParams(location.search);
  dealIdx = parseInt(params.get('i') || '0');
  var deals = JSON.parse(localStorage.getItem('anak-deals') || '[]');
  var d = deals[dealIdx];
  if (!d) { document.getElementById('main-msg').textContent = 'לא נמצאה עסקה'; return; }
  _deal = d;

  checks = (d.deliveryChecks && d.deliveryChecks.length === 2)
    ? d.deliveryChecks.slice()
    : [false, false];
  render();

  var chosen = null;
  if (d.approvalPlans) d.approvalPlans.forEach(function(p){ if (p.chosen) chosen = p; });

  var company  = chosen ? chosen.company : '—';
  var amount   = chosen ? chosen.amount  : (d.finance ? fmt(d.finance) : '—');
  var plate    = d.newPlate || '—';
  var customer = d.customer || '—';

  document.getElementById('main-msg').innerHTML =
    'ממתין לאישור מסירה מחברת המימון ' +
    '<span class="company">' + company + '</span>' +
    ' עבור רכב שמספרו ' +
    '<span class="plate">' + plate + '</span>' +
    ' בסכום של ' +
    '<span class="amount">' + amount + '</span>' +
    ' ללקוח ' +
    '<span class="customer">' + customer + '</span>';
  // מנע חזרה למסכים קודמים
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', function() {
    location.replace('quotes.html');
  });
})();
</script>
</body>
</html>
