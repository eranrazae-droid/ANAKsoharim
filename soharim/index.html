<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>מחשבון מימונים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#0d1f3c;color:#fff;min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:36px 24px 0;text-align:center}
.hdr-logo{font-size:34px;font-weight:900;color:#fff}
.hdr-logo span{color:#c9a227}
.hdr-sub{font-size:14px;color:#7a9ccf;margin-top:8px}
.page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 60px;gap:14px;max-width:480px;margin:0 auto;width:100%}
.tool-btn{
  display:flex;align-items:center;gap:20px;
  width:100%;background:#fff;border-radius:18px;
  padding:22px 24px;text-decoration:none;color:#0d1f3c;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
  transition:transform .12s,box-shadow .12s;
  cursor:pointer;border:none;font-family:'Heebo',sans-serif;
}
.tool-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.35)}
.tool-btn:active{transform:translateY(0)}
.tool-icon{font-size:36px;line-height:1;flex-shrink:0}
.tool-title{font-size:18px;font-weight:900;color:#0d1f3c}
.tool-desc{font-size:13px;color:#5a7aa5;margin-top:3px}
.tool-btn.new  {border-right:5px solid #1a56db}
.tool-btn.used {border-right:5px solid #c9a227}
.tool-btn.quote{border-right:5px solid #16a34a}
.tool-btn.ern  {border-right:5px solid #0ea5e9}
.footer{text-align:center;padding:20px;font-size:12px;color:#2a4a7a}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">מחשבון <span>מימונים</span></div>
  <div class="hdr-sub">כלי מקצועי לסוחרי רכב</div>
</div>

<div class="page">

  <a class="tool-btn new" href="finance-new.html">
    <div class="tool-icon">🚗</div>
    <div>
      <div class="tool-title">מימון רכב חדש</div>
      <div class="tool-desc">כאל · מקס · מימון ישיר · קליק</div>
    </div>
  </a>

  <a class="tool-btn used" href="finance-used.html">
    <div class="tool-icon">🔑</div>
    <div>
      <div class="tool-title">מימון רכב משומש</div>
      <div class="tool-desc">לפי שנתון — כאל · מקס · מימון ישיר · קליק</div>
    </div>
  </a>

  <a class="tool-btn quote" href="quote.html">
    <div class="tool-icon">📋</div>
    <div>
      <div class="tool-title">הצעת מחיר</div>
      <div class="tool-desc">טרייד אין, מימון והחזר חודשי</div>
    </div>
  </a>

  <a class="tool-btn ern" href="ern.html">
    <div class="tool-icon">🧮</div>
    <div>
      <div class="tool-title">מחשבון ERN</div>
      <div class="tool-desc">חישוב השלמות לעסקה</div>
    </div>
  </a>

</div>

<div class="footer">מחשבון מימונים · כלי מקצועי לסוחרי רכב</div>
</body>
</html>
