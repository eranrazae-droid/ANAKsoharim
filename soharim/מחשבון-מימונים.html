<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>מחשבון מימונים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Heebo',sans-serif;
  background:#0d1f3c;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px 16px 48px;
}

.logo{font-size:28px;font-weight:900;color:#fff;text-align:center;margin-bottom:28px}
.logo span{color:#c9a227}

.card{
  background:#fff;
  border-radius:20px;
  padding:24px;
  width:100%;
  max-width:420px;
  box-shadow:0 8px 40px rgba(0,0,0,.3);
  color:#0d1f3c;
}

/* ── FIELDS ── */
.fld{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.fld:last-of-type{margin-bottom:0}
.fld label{font-size:12px;font-weight:700;color:#5a7aa5;letter-spacing:.05em;text-transform:uppercase}

.fld input, .fld select{
  border:2px solid #dce6f5;
  border-radius:12px;
  padding:14px 16px;
  font-family:'Heebo',sans-serif;
  font-size:22px;
  font-weight:700;
  color:#0d1f3c;
  outline:none;
  width:100%;
  background:#f5f8ff;
  transition:border-color .15s;
  appearance:none;
  -webkit-appearance:none;
}
.fld input:focus, .fld select:focus{border-color:#1a56db;background:#fff}
.fld input::placeholder{color:#c8d6ec;font-weight:400;font-size:18px}
.fld select{cursor:pointer;font-size:19px}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}

/* ── DIVIDER ── */
.divider{height:1px;background:#eef2fb;margin:20px 0}

/* ── RESULT ── */
.result{
  background:#0d1f3c;
  border-radius:16px;
  padding:22px;
  text-align:center;
  margin-top:20px;
  display:none;
}
.result.show{display:block}

.result-label{font-size:12px;font-weight:700;color:#7a9ccf;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.result-amount{font-size:54px;font-weight:900;color:#fff;line-height:1}
.result-amount span{font-size:26px;color:#c9a227}
.result-sub{font-size:14px;color:#7a9ccf;margin-top:6px}

.result-details{
  display:flex;
  gap:10px;
  margin-top:16px;
}
.detail-box{
  flex:1;
  background:#1a2f54;
  border-radius:12px;
  padding:12px;
  text-align:center;
}
.detail-lbl{font-size:10px;font-weight:700;color:#7a9ccf;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.detail-val{font-size:15px;font-weight:900;color:#fff}

.balloon-toggle{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:16px;
  cursor:pointer;
  user-select:none;
}
.balloon-toggle input[type=checkbox]{
  width:20px;height:20px;
  accent-color:#1a56db;
  cursor:pointer;
  flex-shrink:0;
}
.balloon-toggle span{font-size:14px;font-weight:700;color:#5a7aa5}

.balloon-field{display:none}
.balloon-field.show{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
</style>
</head>
<body>

<div class="logo">מחשבון <span>מימונים</span></div>

<div class="card">

  <div class="fld">
    <label>סכום מימון (₪)</label>
    <input type="number" id="loan" placeholder="200,000" inputmode="numeric" oninput="calc()">
  </div>

  <div class="row2">
    <div class="fld">
      <label>ריבית שנתית</label>
      <select id="rate" onchange="calc()">
        <option value="3.5">3.5%</option>
        <option value="3.8">3.8%</option>
        <option value="4.0">4.0%</option>
        <option value="4.2" selected>4.2%</option>
        <option value="4.5">4.5%</option>
        <option value="5.0">5.0%</option>
        <option value="5.5">5.5%</option>
        <option value="6.0">6.0%</option>
        <option value="6.5">6.5%</option>
        <option value="7.0">7.0%</option>
        <option value="7.5">7.5%</option>
        <option value="8.0">8.0%</option>
        <option value="8.5">8.5%</option>
        <option value="9.0">9.0%</option>
        <option value="9.5">9.5%</option>
        <option value="10.0">10.0%</option>
        <option value="11.0">11.0%</option>
        <option value="12.0">12.0%</option>
      </select>
    </div>
    <div class="fld">
      <label>תשלומים</label>
      <select id="n" onchange="calc()">
        <option value="12">12</option>
        <option value="24">24</option>
        <option value="36">36</option>
        <option value="48">48</option>
        <option value="60">60</option>
        <option value="72">72</option>
        <option value="84">84</option>
        <option value="96">96</option>
        <option value="100" selected>100</option>
      </select>
    </div>
  </div>

  <label class="balloon-toggle">
    <input type="checkbox" id="balloon-chk" onchange="toggleBalloon()">
    <span>הוסף בלון</span>
  </label>

  <div class="balloon-field" id="balloon-field">
    <label style="font-size:12px;font-weight:700;color:#5a7aa5;letter-spacing:.05em;text-transform:uppercase">סכום בלון (₪)</label>
    <input type="number" id="balloon" placeholder="ברירת מחדל: 50% מהסכום" inputmode="numeric" oninput="calc()"
      style="border:2px solid #dce6f5;border-radius:12px;padding:12px 16px;font-family:'Heebo',sans-serif;font-size:18px;font-weight:700;color:#0d1f3c;outline:none;width:100%;background:#f5f8ff;transition:border-color .15s">
  </div>

  <div class="result" id="result">
    <div class="result-label">החזר חודשי</div>
    <div class="result-amount"><span>₪ </span><span id="r-monthly">—</span></div>
    <div class="result-sub" id="r-sub"></div>
    <div class="result-details">
      <div class="detail-box">
        <div class="detail-lbl">עלות ריבית</div>
        <div class="detail-val" id="r-interest">—</div>
      </div>
      <div class="detail-box">
        <div class="detail-lbl">סה"כ ריבית</div>
        <div class="detail-val" id="r-total-interest">—</div>
      </div>
    </div>
  </div>

</div>

<script>
function toggleBalloon(){
  var show = document.getElementById('balloon-chk').checked;
  document.getElementById('balloon-field').className = 'balloon-field' + (show ? ' show' : '');
  document.getElementById('n').value = show ? '60' : '100';
  calc();
}

function pmt(principal, rate, n, balloon){
  balloon = balloon || 0;
  if(!principal || !n) return 0;
  var r = rate / 100 / 12;
  if(r === 0) return Math.round((principal - balloon) / n);
  var pvB = balloon / Math.pow(1 + r, n);
  return Math.round((principal - pvB) * r / (1 - Math.pow(1 + r, -n)));
}

function fmt(n){ return '₪ ' + Math.round(n).toLocaleString('he-IL'); }

function calc(){
  var loan    = parseFloat(document.getElementById('loan').value) || 0;
  var rate    = parseFloat(document.getElementById('rate').value);
  var n       = parseInt(document.getElementById('n').value);
  var hasBalloon = document.getElementById('balloon-chk').checked;
  var balloonInput = document.getElementById('balloon').value;
  var balloon = hasBalloon ? (balloonInput !== '' ? parseFloat(balloonInput) : Math.round(loan * 0.5)) : 0;

  var result = document.getElementById('result');
  if(!loan){ result.classList.remove('show'); return; }

  var monthly = pmt(loan, rate, n, balloon);
  var interestPerMonth = Math.round(monthly - (loan / n));
  var totalInterest = monthly * n - loan + (hasBalloon && !balloonInput ? 0 : 0);
  totalInterest = Math.round(monthly * n - (loan - balloon));

  result.classList.add('show');
  document.getElementById('r-monthly').textContent = monthly.toLocaleString('he-IL');
  document.getElementById('r-sub').textContent = n + ' תשלומים' + (hasBalloon ? ' · בלון ' + fmt(balloon) : '');
  document.getElementById('r-interest').textContent = fmt(interestPerMonth) + ' /חודש';
  document.getElementById('r-total-interest').textContent = fmt(Math.max(0, monthly * n - loan + balloon));
}

calc();
</script>
</body>
</html>
