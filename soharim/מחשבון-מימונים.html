<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>מחשבון מימונים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#0d1f3c;min-height:100vh}

.screen{display:none;min-height:100vh}
.screen.active{display:flex}

/* ══ LOGIN ══ */
#screen-login{align-items:center;justify-content:center;padding:24px 16px}
.login-box{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:32px}
.logo-main{font-size:36px;font-weight:900;color:#fff;text-align:center}
.logo-main span{color:#c9a227}
.logo-sub{font-size:14px;color:#7a9ccf;margin-top:6px;text-align:center}

.login-card{background:#fff;border-radius:22px;padding:32px 28px;width:100%;box-shadow:0 12px 50px rgba(0,0,0,.35)}
.login-card-title{font-size:16px;font-weight:700;color:#0d1f3c;text-align:center;margin-bottom:24px}

.fld{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
.fld label{font-size:12px;font-weight:700;color:#5a7aa5;letter-spacing:.05em;text-transform:uppercase}
.fld-wrap{position:relative}
.fld input{
  width:100%;border:2px solid #dce6f5;border-radius:12px;
  padding:14px 48px 14px 16px;font-family:'Heebo',sans-serif;
  font-size:22px;font-weight:700;color:#0d1f3c;outline:none;
  background:#f5f8ff;transition:border-color .15s;letter-spacing:4px;
}
.fld input:focus{border-color:#1a56db;background:#fff}
.fld input::placeholder{letter-spacing:0;font-weight:400;font-size:15px;color:#bcc8dc}
.eye-btn{position:absolute;left:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:20px;color:#7a9ccf;padding:0;line-height:1}

.submit-btn{width:100%;background:#1a56db;color:#fff;border:none;border-radius:13px;padding:16px;font-family:'Heebo',sans-serif;font-size:17px;font-weight:900;cursor:pointer;transition:background .15s,transform .1s;box-shadow:0 4px 20px rgba(26,86,219,.35)}
.submit-btn:hover{background:#1448c0}
.submit-btn:active{transform:scale(.98)}

.login-error{display:none;background:#fee2e2;border:1.5px solid #fca5a5;border-radius:10px;padding:11px 14px;font-size:14px;font-weight:700;color:#991b1b;text-align:center;margin-top:14px}
.login-error.show{display:block}

/* ══ CALCULATOR ══ */
#screen-calc{align-items:center;justify-content:center;flex-direction:column;padding:24px 16px 48px}
.calc-logo{font-size:26px;font-weight:900;color:#fff;text-align:center;margin-bottom:24px}
.calc-logo span{color:#c9a227}

.card{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.3);color:#0d1f3c}

.cfld{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.cfld label{font-size:12px;font-weight:700;color:#5a7aa5;letter-spacing:.05em;text-transform:uppercase}
.cfld input,.cfld select{
  border:2px solid #dce6f5;border-radius:12px;padding:14px 16px;
  font-family:'Heebo',sans-serif;font-size:22px;font-weight:700;color:#0d1f3c;
  outline:none;width:100%;background:#f5f8ff;transition:border-color .15s;
  appearance:none;-webkit-appearance:none;
}
.cfld input:focus,.cfld select:focus{border-color:#1a56db;background:#fff}
.cfld input::placeholder{color:#c8d6ec;font-weight:400;font-size:18px}
.cfld select{cursor:pointer;font-size:19px}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}

.balloon-toggle{display:flex;align-items:center;gap:10px;margin-bottom:16px;cursor:pointer;user-select:none}
.balloon-toggle input[type=checkbox]{width:22px;height:22px;accent-color:#1a56db;cursor:pointer;flex-shrink:0}
.balloon-toggle span{font-size:15px;font-weight:700;color:#5a7aa5}

.balloon-field{display:none;flex-direction:column;gap:6px;margin-bottom:16px}
.balloon-field.show{display:flex}
.balloon-field label{font-size:12px;font-weight:700;color:#5a7aa5;letter-spacing:.05em;text-transform:uppercase}
.balloon-field input{
  border:2px solid #dce6f5;border-radius:12px;padding:12px 16px;
  font-family:'Heebo',sans-serif;font-size:18px;font-weight:700;color:#0d1f3c;
  outline:none;width:100%;background:#f5f8ff;transition:border-color .15s;
}
.balloon-field input:focus{border-color:#1a56db;background:#fff}

.result{background:#0d1f3c;border-radius:16px;padding:22px;text-align:center;margin-top:20px;display:none}
.result.show{display:block}
.result-label{font-size:12px;font-weight:700;color:#7a9ccf;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.result-amount{font-size:54px;font-weight:900;color:#fff;line-height:1}
.result-amount span{font-size:26px;color:#c9a227}
.result-sub{font-size:14px;color:#7a9ccf;margin-top:6px}
.result-details{display:flex;gap:10px;margin-top:16px}
.detail-box{flex:1;background:#1a2f54;border-radius:12px;padding:12px;text-align:center}
.detail-lbl{font-size:10px;font-weight:700;color:#7a9ccf;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.detail-val{font-size:15px;font-weight:900;color:#fff}

.logout-btn{margin-top:20px;background:none;border:none;color:#2a4a7a;font-family:'Heebo',sans-serif;font-size:12px;cursor:pointer;text-decoration:underline}
</style>
</head>
<body>

<!-- ══ CALCULATOR SCREEN ══ -->
<div id="screen-calc" class="screen active">
  <div class="calc-logo">מחשבון <span>מימונים</span></div>

  <div class="card">

    <div class="cfld">
      <label>סכום מימון (₪)</label>
      <input type="number" id="loan" placeholder="200,000" inputmode="numeric">
    </div>

    <div class="row2">
      <div class="cfld">
        <label>ריבית שנתית</label>
        <select id="rate">
          <option value="3.5">3.5%</option>
          <option value="3.8">3.8%</option>
          <option value="4.0">4.0%</option>
          <option value="4.2" selected>4.2%</option>
          <option value="4.5">4.5%</option>
          <option value="5.0">5.0%</option>
          <option value="5.5">5.5%</option>
          <option value="6.0">6.0%</option>
          <option value="6.5">6.5%</option>
          <option value="7.0">7.0%</option>
          <option value="7.5">7.5%</option>
          <option value="8.0">8.0%</option>
          <option value="8.5">8.5%</option>
          <option value="9.0">9.0%</option>
          <option value="9.5">9.5%</option>
          <option value="10.0">10.0%</option>
          <option value="11.0">11.0%</option>
          <option value="12.0">12.0%</option>
        </select>
      </div>
      <div class="cfld">
        <label>תשלומים</label>
        <select id="n">
          <option value="12">12</option>
          <option value="24">24</option>
          <option value="36">36</option>
          <option value="48">48</option>
          <option value="60">60</option>
          <option value="72">72</option>
          <option value="84">84</option>
          <option value="96">96</option>
          <option value="100" selected>100</option>
        </select>
      </div>
    </div>

    <label class="balloon-toggle">
      <input type="checkbox" id="balloon-chk">
      <span>הוסף בלון</span>
    </label>

    <div class="balloon-field" id="balloon-field">
      <label>סכום בלון (₪)</label>
      <input type="number" id="balloon" placeholder="ברירת מחדל: 50% מהסכום" inputmode="numeric">
    </div>

    <div class="result" id="result">
      <div class="result-label">החזר חודשי</div>
      <div class="result-amount"><span>₪ </span><span id="r-monthly">—</span></div>
      <div class="result-sub" id="r-sub"></div>
      <div class="result-details">
        <div class="detail-box">
          <div class="detail-lbl">עלות ריבית</div>
          <div class="detail-val" id="r-interest">—</div>
        </div>
        <div class="detail-box">
          <div class="detail-lbl">סה"כ ריבית</div>
          <div class="detail-val" id="r-total-interest">—</div>
        </div>
      </div>
    </div>

  </div>

  <button class="logout-btn" id="logout-btn">יציאה</button>
</div>

<script>
document.getElementById('logout-btn').addEventListener('click', function(){
  location.reload();
});

/* ══ CALCULATOR ══ */
function pmt(p, r, n, b) {
  b = b || 0;
  if (!p || !n) return 0;
  var mr = r / 100 / 12;
  if (mr === 0) return Math.round((p - b) / n);
  return Math.round((p - b / Math.pow(1+mr, n)) * mr / (1 - Math.pow(1+mr, -n)));
}

function fmt(n){ return '₪ ' + Math.round(n).toLocaleString('he-IL'); }

function calc() {
  var loan = parseFloat(document.getElementById('loan').value) || 0;
  var rate = parseFloat(document.getElementById('rate').value);
  var n    = parseInt(document.getElementById('n').value);
  var hasBalloon = document.getElementById('balloon-chk').checked;
  var bInput = document.getElementById('balloon').value;
  var balloon = hasBalloon ? (bInput !== '' ? parseFloat(bInput) : Math.round(loan * 0.5)) : 0;
  var res = document.getElementById('result');
  if (!loan) { res.className = 'result'; return; }
  var monthly = pmt(loan, rate, n, balloon);
  var intMonth = Math.round(monthly - loan / n);
  var totalInt = Math.max(0, monthly * n - loan + balloon);
  res.className = 'result show';
  document.getElementById('r-monthly').textContent = monthly.toLocaleString('he-IL');
  document.getElementById('r-sub').textContent = n + ' תשלומים' + (hasBalloon ? ' · בלון ' + fmt(balloon) : '');
  document.getElementById('r-interest').textContent = fmt(intMonth) + ' /חודש';
  document.getElementById('r-total-interest').textContent = fmt(totalInt);
}

document.getElementById('loan').addEventListener('input', calc);
document.getElementById('rate').addEventListener('change', calc);
document.getElementById('n').addEventListener('change', calc);
document.getElementById('balloon').addEventListener('input', calc);
document.getElementById('balloon-chk').addEventListener('change', function(){
  var on = this.checked;
  document.getElementById('balloon-field').className = 'balloon-field' + (on ? ' show' : '');
  document.getElementById('n').value = on ? '60' : '100';
  calc();
});
</script>
</body>
</html>
