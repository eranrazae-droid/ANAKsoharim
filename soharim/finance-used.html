<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>מימון רכב משומש — מחשבון מימונים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#f0f4fa;color:#0d1f3c;min-height:100vh}

.hdr{background:#0d1f3c;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-size:18px;font-weight:900;color:#fff}
.hdr-logo span{color:#c9a227}
.back-btn{color:#7a9ccf;font-size:13px;font-weight:700;text-decoration:none;background:#1a2f54;padding:8px 14px;border-radius:8px}

.page{max-width:900px;margin:0 auto;padding:20px 14px 60px}
.page-title{font-size:24px;font-weight:900;color:#0d1f3c;text-align:center;margin-bottom:18px}
.page-title span{color:#c9a227}

.input-card{background:#fff;border-radius:14px;border:1px solid #dce6f5;padding:18px;margin-bottom:20px;box-shadow:0 2px 10px rgba(13,31,60,.07)}
.input-row{display:flex;gap:12px}
.fld{flex:1;display:flex;flex-direction:column;gap:5px}
.fld label{font-size:11px;font-weight:700;color:#5a7aa5;letter-spacing:.05em;text-transform:uppercase}
.fld input,.fld select{
  background:#f5f8ff;border:1.5px solid #dce6f5;border-radius:10px;
  padding:12px 14px;font-size:20px;font-weight:700;font-family:'Heebo',sans-serif;
  color:#0d1f3c;outline:none;width:100%;transition:border-color .15s;
  appearance:none;-webkit-appearance:none;
}
.fld select{font-size:16px;cursor:pointer}
.fld input:focus,.fld select:focus{border-color:#c9a227;background:#fff}
.fld input::placeholder{color:#bcc8dc;font-weight:400;font-size:16px}
.balloon-row{margin-top:12px;padding-top:12px;border-top:1px solid #eef2fb}
.balloon-row .fld input{font-size:16px;padding:10px 14px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.ccard{background:#fff;border-radius:16px;border:2px solid #dce6f5;box-shadow:0 2px 12px rgba(13,31,60,.07);overflow:hidden;display:flex;flex-direction:column}
.ccard.kal  {border-color:#1a56db}
.ccard.max  {border-color:#7c3aed}
.ccard.yasir{border-color:#e02d2d}
.ccard.click{border-color:#059669}

.ccard-header{padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.ccard.kal   .ccard-header{background:#eef3ff}
.ccard.max   .ccard-header{background:#f5f3ff}
.ccard.yasir .ccard-header{background:#fff0f0}
.ccard.click .ccard-header{background:#f0fdf4}

.ccard-name{font-size:16px;font-weight:900}
.ccard.kal   .ccard-name{color:#1a56db}
.ccard.max   .ccard-name{color:#7c3aed}
.ccard.yasir .ccard-name{color:#e02d2d}
.ccard.click .ccard-name{color:#059669}

.ccard-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px;flex:1}

.sel-row{display:flex;flex-direction:column;gap:4px}
.sel-lbl{font-size:10px;font-weight:700;color:#5a7aa5;letter-spacing:.05em;text-transform:uppercase}
.ccard-sel{
  width:100%;border:1.5px solid #dce6f5;border-radius:8px;
  background:#f8faff;padding:8px 10px;
  font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;color:#0d1f3c;
  outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;
  transition:border-color .15s;
}

.ccard-result{background:#f5f8ff;border-radius:10px;padding:12px;text-align:center;border:1px solid #eef2fb}
.ccard-monthly{font-size:28px;font-weight:900;color:#0d1f3c;line-height:1}
.ccard.kal.best   .ccard-monthly{color:#1a56db}
.ccard.max.best   .ccard-monthly{color:#7c3aed}
.ccard.yasir.best .ccard-monthly{color:#e02d2d}
.ccard.click.best .ccard-monthly{color:#059669}
.ccard-lbl{font-size:11px;color:#5a7aa5;margin-top:2px;margin-bottom:8px}
.ccard-detail{font-size:11px;color:#7a9ab8;line-height:1.6}
.ccard-detail strong{color:#0d1f3c}

.ccard-disabled{opacity:.45;pointer-events:none}
.ccard-disabled .ccard-result{background:#fafafa}
.ccard-maxn{font-size:10px;color:#e02d2d;font-weight:700;margin-top:2px}

.warn-box{background:#fff8e6;border:1px solid #f0d070;border-radius:10px;padding:12px 16px;font-size:13px;font-weight:600;color:#7a5a00;text-align:center;grid-column:1/-1}
.no-loan{text-align:center;padding:20px;color:#bcc8dc;font-size:13px;grid-column:1/-1}

@media(max-width:540px){
  .input-row{flex-direction:column}
  .grid{grid-template-columns:1fr}
  .ccard-monthly{font-size:24px}
}
@media(min-width:700px){
  .grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">מחשבון <span>מימונים</span></div>
  </div>
  <a class="back-btn" href="index.html">→ ראשי</a>
</div>

<div class="page">
  <div class="page-title">מימון לרכב <span>משומש</span></div>

  <div class="input-card">
    <div class="input-row">
      <div class="fld">
        <label>סכום מימון (₪)</label>
        <input type="number" id="loan" placeholder="150,000" oninput="calc()" inputmode="numeric">
      </div>
      <div class="fld">
        <label>שנתון הרכב</label>
        <select id="year" onchange="calc()">
          <option value="">— בחר שנתון —</option>
          <option value="2026">2026</option>
          <option value="2025" selected>2025</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
          <option value="2022">2022</option>
          <option value="2021">2021</option>
          <option value="2020">2020</option>
          <option value="2019">2019</option>
          <option value="2018">2018</option>
          <option value="2017">2017</option>
          <option value="2016">2016</option>
          <option value="2015">2015</option>
          <option value="2014">2014</option>
          <option value="2013">2013</option>
          <option value="2012">2012</option>
          <option value="2011">2011</option>
        </select>
      </div>
    </div>
    <div class="balloon-row">
      <div class="fld">
        <label>סכום בלון (₪) — אופציונלי</label>
        <input type="number" id="balloon" placeholder="ברירת מחדל: 50% מהסכום" oninput="calc()" inputmode="numeric">
      </div>
    </div>
  </div>

  <div class="grid" id="cards"></div>
</div>

<script>
var KAL_RATES   = [4.0,4.5,5.0,5.5,5.8,6.0,6.5,7.0,7.5,8.0,8.5,9.0];
var YASIR_RATES = [6.5,7.0,7.5,8.0,8.5,9.0,9.5,10.0,11.0,12.0];

// מקסימום תשלומים לפי שנתון
var KAL_MAX = {
  2026:84, 2025:84, 2024:84, 2023:84, 2022:84,
  2021:72, 2020:60, 2019:60, 2018:48,
  2017:36, 2016:24, 2015:24, 2014:24, 2013:24, 2012:12, 2011:12
};
var YASIR_MAX = {
  2026:100, 2025:100, 2024:100, 2023:100, 2022:84,
  2021:72, 2020:60, 2019:58, 2018:46, 2017:34,
  2016:22, 2015:36, 2014:36, 2013:36, 2012:24, 2011:12
};

var COMPANIES = [
  {id:'kal',   name:'כאל',        rates:KAL_RATES,   defRate:5.8, feeType:'kal',   maxMap:KAL_MAX },
  {id:'max',   name:'מקס',        rates:KAL_RATES,   defRate:5.8, feeType:'kal',   maxMap:KAL_MAX },
  {id:'yasir', name:'מימון ישיר', rates:YASIR_RATES, defRate:9.0, feeType:'yasir', maxMap:YASIR_MAX},
  {id:'click', name:'קליק',       rates:YASIR_RATES, defRate:9.0, feeType:'yasir', maxMap:YASIR_MAX}
];

var state = {};
COMPANIES.forEach(function(c){ state[c.id] = {rate: c.defRate, n: null}; });

function feeKal(loan) { return loan <= 100000 ? 345 : Math.round(345 + loan * 0.01); }
function feeYasir(loan) { return Math.round(loan * 0.015 + 400); }

function pmt(principal, rate, n, balloon) {
  balloon = balloon || 0;
  if (!principal || !n) return 0;
  var r = rate / 100 / 12;
  if (r === 0) return Math.round((principal - balloon) / n);
  var pvB = balloon / Math.pow(1 + r, n);
  return Math.round((principal - pvB) * r / (1 - Math.pow(1 + r, -n)));
}

function fmt(n) { return '₪ ' + Math.round(n).toLocaleString('he-IL'); }

function makePaymentSteps(maxN) {
  var steps = [];
  for (var i = 12; i <= Math.min(96, maxN); i += 12) steps.push(i);
  if (maxN >= 100) steps.push(100);
  else if (maxN > 96 && maxN < 100) steps.push(maxN);
  return steps;
}

function setState(id, key, val) {
  state[id][key] = +val;
  calc();
}

function calc() {
  var loan = parseFloat(document.getElementById('loan').value) || 0;
  var yearVal = parseInt(document.getElementById('year').value) || 0;
  var balloonInput = document.getElementById('balloon').value;
  var balloon = balloonInput !== '' ? parseFloat(balloonInput) : Math.round(loan * 0.5);
  var el = document.getElementById('cards');

  if (!loan) {
    el.innerHTML = '<div class="no-loan">הכנס סכום מימון ושנתון כדי לראות תוצאות</div>';
    return;
  }
  if (!yearVal) {
    el.innerHTML = '<div class="warn-box">יש לבחור שנתון כדי לחשב</div>';
    return;
  }

  var results = COMPANIES.map(function(c) {
    var maxN = c.maxMap[yearVal] || 12;
    var steps = makePaymentSteps(maxN);
    var s = state[c.id];
    // if saved n exceeds maxN for this year, reset
    if (!s.n || s.n > maxN) s.n = maxN;
    var monthly = pmt(loan, s.rate, s.n, 0);
    var monthlyBalloon = pmt(loan, s.rate, Math.min(s.n, 60), balloon);
    var fee = c.feeType === 'kal' ? feeKal(loan) : feeYasir(loan);
    return {c:c, s:s, maxN:maxN, steps:steps, monthly:monthly, monthlyBalloon:monthlyBalloon, fee:fee, disabled: maxN < 12};
  });

  var activeResults = results.filter(function(r){ return !r.disabled; });
  var minMonthly = activeResults.length ? Math.min.apply(null, activeResults.map(function(r){ return r.monthly; })) : 0;

  var html = '';
  results.forEach(function(r) {
    var isBest = !r.disabled && r.monthly === minMonthly;
    var interest = Math.round(r.monthly - loan / r.s.n);

    var rateOpts = r.c.rates.map(function(rt) {
      return '<option value="'+rt+'"'+(rt===r.s.rate?' selected':'')+'>'+rt+'%</option>';
    }).join('');

    var nOpts = r.steps.map(function(n) {
      return '<option value="'+n+'"'+(n===r.s.n?' selected':'')+'>'+n+' תשלומים</option>';
    }).join('');

    html += '<div class="ccard '+r.c.id+(isBest?' best':'')+(r.disabled?' ccard-disabled':'')+ '">';
    html += '<div class="ccard-header"><div class="ccard-name">'+r.c.name+'</div>'+(isBest?'<span style="font-size:10px;font-weight:700;background:#c9a227;color:#fff;border-radius:5px;padding:2px 7px">הכי זול</span>':'')+'</div>';
    html += '<div class="ccard-body">';

    if (r.disabled) {
      html += '<div style="text-align:center;padding:20px;font-size:13px;color:#e02d2d;font-weight:700">לא זמין לשנתון זה</div>';
    } else {
      html += '<div class="sel-row"><div class="sel-lbl">ריבית</div>';
      html += '<select class="ccard-sel" onchange="setState(\''+r.c.id+'\',\'rate\',this.value)">'+rateOpts+'</select></div>';
      html += '<div class="sel-row"><div class="sel-lbl">תשלומים</div>';
      html += '<select class="ccard-sel" onchange="setState(\''+r.c.id+'\',\'n\',this.value)">'+nOpts+'</select>';
      html += '<div class="ccard-maxn">מקסימום לשנתון זה: '+r.maxN+'</div></div>';

      html += '<div class="ccard-result">';
      html += '<div class="ccard-monthly">'+fmt(r.monthly)+'</div>';
      html += '<div class="ccard-lbl">לחודש (ללא בלון)</div>';
      if (balloon > 0) {
        html += '<div style="font-size:12px;font-weight:900;color:#c9a227;margin-bottom:6px">'+fmt(r.monthlyBalloon)+' <span style="font-size:10px;font-weight:400;color:#7a9ab8">עם בלון</span></div>';
      }
      html += '<div class="ccard-detail"><strong>עלות ריבית:</strong> '+fmt(interest)+' /חודש</div>';
      html += '<div class="ccard-detail"><strong>עמלת פתיחת תיק:</strong> '+fmt(r.fee)+'</div>';
      html += '</div>';
    }

    html += '</div></div>';
  });

  el.innerHTML = html;
}

calc();
</script>
</body>
</html>
