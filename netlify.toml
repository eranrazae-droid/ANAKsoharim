[functions]
  directory = "netlify/functions"

# פיד קטלוג ציבורי וקבוע ל-Meta
[[redirects]]
  from = "/catalog.xml"
  to = "/.netlify/functions/catalog-xml"
  status = 200

[[redirects]]
  from = "/catalog.csv"
  to = "/.netlify/functions/catalog-feed"
  status = 200

# נתיבים ידידותיים למיגרציית מזהי Meta (עוקפים חוסמי פרסומות שחוסמים /.netlify/functions/)
[[redirects]]
  from = "/admin-api/meta-id-migration/preview"
  to = "/.netlify/functions/migrate-metaids"
  status = 200

[[redirects]]
  from = "/admin-api/meta-id-migration/apply"
  to = "/.netlify/functions/migrate-metaids"
  status = 200

[[redirects]]
  from = "/admin-api/mark-paid"
  to = "/.netlify/functions/mark-paid"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
